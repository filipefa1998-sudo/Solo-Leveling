// ── GAME STATE ───────────────────────────────────────────────────────────────
let G = null // global state
const SAVE_KEY = 'sl_hunter_data'
let saveTimer = null

function loadState(){
  // BUG 7 FIX: shallow spread overwrote nested objects entirely, dropping new
  // default sub-fields (e.g. new soldier properties). Deep-merge each nested layer.
  try{
    const raw=localStorage.getItem(SAVE_KEY)
    if(raw){
      const saved=JSON.parse(raw)
      const def=makeDefault()
      G={...def,...saved}
      G.attrs={...def.attrs,...(saved.attrs||{})}
      G.attrCounts={...def.attrCounts,...(saved.attrCounts||{})}
      G.soldiers=Object.fromEntries(SKEYS.map(k=>[k,{...def.soldiers[k],...((saved.soldiers||{})[k]||{})}]))
    } else {
      G=makeDefault()
    }
  }
  catch(e){G=makeDefault()}
  render()
}

function saveState(){
  if(!G)return
  clearTimeout(saveTimer)
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(G))}catch(e){console.error(e)}
  },800)
}

function setState(fn){
  G=typeof fn==='function'?fn(G):fn
  saveState()
  render()
}

// ── XP ENGINE ───────────────────────────────────────────────────────────────
function getXPMult(){
  let m=1
  SKEYS.forEach(k=>{if(G.soldiers[k].rankIndex>=GEN)m+=0.1})
  if(G.soldiers.willpower.rankIndex>=GM&&G.streak>0)m*=Math.pow(1.05,Math.min(G.streak,10))
  return parseFloat(m.toFixed(2))
}
function computeXP(task){
  const base=XP_RANK[task.diff];const sol=G.soldiers[task.attr];let xp=base
  if(sol.rankIndex>=0)xp+=1
  if(sol.rankIndex>=1)xp=Math.round(xp*1.2)
  if(task.attr==='intellect'&&sol.rankIndex>=2&&(task.category==='Study'||task.category==='Work'))xp+=5
  if(task.attr==='charisma'&&sol.rankIndex>=2&&task.category==='Social')xp+=8
  if(task.attr==='intellect'&&sol.rankIndex>=GM)xp*=3
  if(task.attr==='charisma'&&sol.rankIndex>=GM)xp*=2
  if(task.priority)xp*=2
  // BUG 10 FIX: evaluate morning bonus at computation time (completion), not at task creation.
  const _isMorning=new Date().getHours()<9
  if(task.attr==='spiritual'&&sol.rankIndex>=2&&_isMorning)xp*=2
  return Math.round(xp*getXPMult())
}
function checkTitles(){
  const newOnes=ALL_TITLES.filter(t=>!G.earnedTitles.includes(t.id)&&t.check(G))
  if(newOnes.length){
    G.earnedTitles=[...G.earnedTitles,...newOnes.map(t=>t.id)]
    newOnes.forEach((t,i)=>setTimeout(()=>showTitleUnlock(t),i*4500))
  }
}
function addHunterXP(amount){
  // BUG 1 FIX: computeXP() already applies getXPMult(). Do NOT multiply again.
  const final=Math.round(amount)
  G.xp+=final;G.totalXP+=final
  spawnXPFloat('+'+final+' EXP','#c8a0ff')
  const cur=HUNTER_RANKS[G.rankIndex]
  if(G.xp>=cur.xpNeeded&&G.rankIndex<HUNTER_RANKS.length-1){
    G.xp-=cur.xpNeeded;G.level++;G.rankIndex++
    const nr=HUNTER_RANKS[G.rankIndex]
    G.rankHistory=[{rank:nr.rank,title:nr.title,level:G.level,date:new Date().toLocaleDateString()},...(G.rankHistory||[])]
    const fl=document.createElement('div');fl.className='level-flash';fl.style.background='rgba(30,144,255,.15)';document.body.appendChild(fl);setTimeout(()=>fl.remove(),700)
    setTimeout(()=>showHunterRankup(nr),800)
    setTimeout(()=>checkSovereignMode(),600) // BUG 4 FIX: activate Sovereign Mode on rank-up
    showNotif({icon:'↑',title:'LEVEL UP',body:'Hunter Level '+G.level+' achieved',color:'#1e90ff',duration:2500})
  }
}
function addSoldierXPFn(attrKey,amount){
  const sol=G.soldiers[attrKey]
  sol.xp+=amount;sol.questsCompleted++;sol.kills++
  G.attrs[attrKey]=Math.min(100,(G.attrs[attrKey]||0)+amount/8)
  G.attrCounts[attrKey]=(G.attrCounts[attrKey]||0)+1
  const cur=SOLDIER_RANKS[sol.rankIndex]
  if(sol.xp>=cur.xpNeeded&&sol.rankIndex<SOLDIER_RANKS.length-1){
    sol.xp-=cur.xpNeeded;sol.rankIndex++
    const nr=SOLDIER_RANKS[sol.rankIndex]
    if(sol.rankIndex===EK&&!sol.named){setTimeout(()=>openNaming(attrKey),800)}
    else showNotif({icon:SOLDIERS[attrKey].icon,title:'SOLDIER EVOLVED',body:SOLDIERS[attrKey].classLabel+' → '+nr.name,color:SOLDIERS[attrKey].color,duration:3000})
    checkTitles()
  }
}
function updateStreak(){
  const today=new Date().toLocaleDateString()
  if(G.lastDay===today)return
  const yest=new Date(Date.now()-86400000).toLocaleDateString()
  const shield=G.soldiers.physique.rankIndex>=EK
  if(G.lastDay===yest)G.streak=(G.streak||0)+1
  else if(shield&&G.streakShieldUsed!==today){
    // BUG 6 FIX: set lastDay=yest so tomorrow's check (G.lastDay===yest) passes
    // and the streak increments normally the next day.
    G.streakShieldUsed=today;G.lastDay=yest
    showNotif({icon:'🔰',title:'SHIELD WALL',body:'Warlord protected your streak!',color:'#ff4455',duration:4000})
    return // don't overwrite lastDay at bottom
  } else {
    G.streak=1;G.dailyCompleteStreak=0
  }
  G.lastDay=today
}
function hasPriorityAvail(){
  const today=new Date().toDateString()
  for(const k of SKEYS)if(G.soldiers[k].rankIndex>=CMD&&G.soldiers[k].priorityUsedToday!==today)return k
  return null
}
function countPriorityAvail(){
  const today=new Date().toDateString()
  return SKEYS.filter(k=>G.soldiers[k].rankIndex>=CMD&&G.soldiers[k].priorityUsedToday!==today).length
}

let notifQ=[],notifBusy=false
function showNotif(cfg){notifQ.push(cfg);if(!notifBusy)drainNotif()}
function drainNotif(){
  if(!notifQ.length){notifBusy=false;return}
  notifBusy=true;const cfg=notifQ.shift()
  const c=cfg.color||'#1e90ff',dur=cfg.duration||3000
  const el=document.createElement('div');el.className='sys-notif'
  el.innerHTML=`<div class="sys-notif-scan"></div><div class="sys-notif-border" style="border-color:${c}40"></div><div class="sys-notif-inner"><div class="sys-notif-icon" style="color:${c};border-color:${c}40;background:${c}18">${cfg.icon||'!'}</div><div><div class="sys-notif-title" style="color:${c}">${cfg.title||'SYSTEM'}</div><div class="sys-notif-body">${cfg.body||''}</div>${cfg.xp?`<div class="sys-notif-xp" style="color:${c}">+${cfg.xp} EXP</div>`:''}</div></div><div class="sys-notif-progress" style="background:${c};animation-duration:${dur}ms"></div>`
  document.getElementById('notifContainer').appendChild(el)
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')))
  setTimeout(()=>{el.classList.add('hide');setTimeout(()=>{el.remove();setTimeout(drainNotif,80)},350)},dur)
}
function spawnXPFloat(txt,color){
  const bar=document.getElementById('xpBarEl')
  if(!bar)return
  const rect=bar.getBoundingClientRect()
  const el=document.createElement('div');el.className='xp-float'
  el.textContent=txt;el.style.cssText=`left:${rect.left+40}px;top:${rect.top-10}px;font-size:14px;color:${color};text-shadow:0 0 8px ${color}`
  document.body.appendChild(el);setTimeout(()=>el.remove(),1600)
}

  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='shadow-particle';const s=3+Math.random()*6;p.style.cssText=`width:${s}px;height:${s}px;bottom:${Math.random()*30}%;left:${Math.random()*100}%;background:${c};--dy:${-100-Math.random()*300}px;--dx:${(Math.random()-.5)*200}px;animation-duration:${1+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;bg.appendChild(p)}
  for(let r=0;r<3;r++){const radius=[180,260,340][r];const ring=document.createElement('div');ring.className='rune-ring';ring.style.cssText=`width:${radius*2}px;height:${radius*2}px;border-color:${c}30;animation-duration:${20+r*8}s;animation-direction:${r%2?'reverse':'normal'}`;for(let i=0;i<6+r*3;i++){const angle=(i/(6+r*3))*360;const rad=angle*Math.PI/180;const ch=document.createElement('div');ch.className='rune-char';ch.style.cssText=`left:${radius+Math.cos(rad)*radius-6}px;top:${radius+Math.sin(rad)*radius-8}px;position:absolute;color:${c}50;animation-delay:${Math.random()*2}s`;ch.textContent=RUNES[Math.floor(Math.random()*RUNES.length)];ring.appendChild(ch)}rc.appendChild(ring)}
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function completeTask(taskId){
  const task=G.tasks.find(t=>t.id===taskId)
  if(!task||task.done)return
  const xpE=computeXP(task)
  task.done=true;task.xp=xpE
  G.completedTotal++;if(task.diff==='S')G.sRankCount++
  const now=new Date()
  if(now.getHours()<12){const key='mb_'+now.toLocaleDateString();G._mb=G._mb||{};G._mb[key]=(G._mb[key]||0)+1;if(G._mb[key]>(G.morningBurstRecord||0))G.morningBurstRecord=G._mb[key]}
  if(task.attr==='spiritual'&&now.getHours()<9)G.morningSpiritual=(G.morningSpiritual||0)+1
  G.attrCounts[task.attr]=(G.attrCounts[task.attr]||0)+1
  G.attrs[task.attr]=Math.min(100,(G.attrs[task.attr]||0)+xpE/8)
  const today=new Date().toLocaleDateString()
  G.dayLog[today]=[...(G.dayLog[today]||[]),`[${ALABELS[task.attr]}${task.priority?' ★':''}] ${task.name}`]
  updateStreak()
  const dTasks=G.tasks.filter(t=>t.daily),dDone=G.tasks.filter(t=>t.daily&&t.done).length
  if(G.soldiers.willpower.rankIndex>=EK&&dTasks.length>0&&dDone===dTasks.length){G.dailyCompleteStreak=(G.dailyCompleteStreak||0)+1;G.xp+=75;G.totalXP+=75;showNotif({icon:'🏅',title:'RITUAL MASTER',body:'All daily quests cleared — +75 XP!',color:'#ffaa22',duration:3500})}
  showNotif({icon:task.priority?'👑':SOLDIERS[task.attr].icon,title:task.priority?'PRIORITY CLEARED':'QUEST CLEARED',body:SOLDIERS[task.attr].classLabel+' grows stronger',xp:xpE,color:task.priority?'#ff6600':ACOLORS[task.attr],duration:task.diff==='S'?4000:3000})
  addHunterXP(xpE);addSoldierXPFn(task.attr,xpE);checkTitles();saveState();render()
}
function markPriority(taskId){
  const today=new Date().toDateString()
  const task=G.tasks.find(t=>t.id===taskId);if(!task||task.done)return
  if(task.priority){task.priority=false;saveState();render();return}
  const avail=hasPriorityAvail()
  if(!avail){showNotif({icon:'!',title:'NO PRIORITY SLOTS',body:'All Commander soldiers used their Priority mark today',color:'#ff6600',duration:3000});return}
  G.soldiers[avail].priorityUsedToday=today;task.priority=true
  showNotif({icon:'👑',title:'PRIORITY MARKED',body:(G.soldiers[avail].name||SOLDIERS[avail].classLabel)+' marks this quest — 2× XP',color:'#ff6600',duration:3000})
  saveState();render()
}
function addTask(daily=false){
  const nameEl=document.getElementById('taskInput'),name=nameEl.value.trim();if(!name)return
  const diff=document.getElementById('taskDiff').value
  const attr=document.getElementById('taskAttr').value
  const cat=document.getElementById('taskCat').value
  const time=document.getElementById('taskTime2').value
  const dur=document.getElementById('taskDur').value // BUG 11 FIX: was never read before
  const accentMap={E:'#8a9ab0',D:'#00cc66',C:'#0099ff',B:'#aa44ff',A:'#ff6600',S:'#ffcc00'}
  const now=new Date()
  const task={id:Date.now()+Math.random(),name,diff,attr,category:cat,time,duration:dur?parseInt(dur,10):null,daily,done:false,priority:false,accent:accentMap[diff]} // BUG 10 FIX: morningBonus removed from task — evaluated at completion inside computeXP()
  task.xp=computeXP(task)
  G.tasks.push(task);nameEl.value='';showNotif({icon:SOLDIERS[attr].icon,title:'QUEST REGISTERED',body:name,color:ACOLORS[attr],duration:2000})
  saveState();render()
}
function deleteTask(taskId){G.tasks=G.tasks.filter(t=>t.id!==taskId);saveState();render()}
function equipTitle(id){G.equippedTitle=G.equippedTitle===id?null:id;saveState();render()}
function onSessionComplete(mins,label){
  let xpE=mins*2
  if(G.soldiers.vitality.rankIndex>=GEN)xpE=Math.round(xpE*1.5)
  if(G.soldiers.vitality.rankIndex>=EK)xpE+=5
  G.focusSessions++;G.focusMinutes+=mins
  G.focusLog=[{label,mins,xp:xpE,time:new Date().toLocaleTimeString()},...(G.focusLog||[]).slice(0,49)]
  showNotif({icon:'◈',title:'GATE CLEARED',body:`${label} — ${mins} min`,xp:xpE,color:'#7b2fff',duration:3000})
  addHunterXP(xpE);addSoldierXPFn('willpower',xpE);checkTitles();saveState();render()
}

let timerSecs=25*60,timerMax=25*60,timerRunning=false,timerLabel='FOCUS GATE',timerInterval=null
function timerToggle(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;updateTimerUI()}
  else{timerRunning=true;timerInterval=setInterval(()=>{timerSecs--;if(timerSecs<=0){clearInterval(timerInterval);timerRunning=false;const mins=Math.round(timerMax/60);onSessionComplete(mins,timerLabel);timerSecs=timerMax}updateTimerUI()},1000);updateTimerUI()}
}
function timerReset(){clearInterval(timerInterval);timerRunning=false;timerSecs=timerMax;updateTimerUI()}
function setPreset(m,l){timerReset();timerMax=m*60;timerSecs=m*60;timerLabel=l;updateTimerUI()}
function updateTimerUI(){
  const min=Math.floor(timerSecs/60),sec=timerSecs%60
  const disp=document.getElementById('timerDisplay2')
  if(disp)disp.textContent=String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0')
  const ring=document.getElementById('timerRing2')
  // BUG 8 FIX: offset should equal full circumference at start, draining to 0 as time runs out.
  // Was (1-ratio) which inverted the fill direction.
  if(ring)ring.style.strokeDashoffset=(2*Math.PI*80)*(timerSecs/timerMax)
  const lbl=document.getElementById('timerLabelTxt2');if(lbl)lbl.textContent=timerLabel
  const btn=document.getElementById('timerStartBtn2');if(btn)btn.textContent=timerRunning?'⏸ PAUSE':'▶ ENTER GATE'
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',b.dataset.mins==Math.round(timerMax/60)))
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth()
function renderCalendar(){
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December']
  const ct=document.getElementById('calMonthTitle');if(ct)ct.textContent=MONTHS[calMonth]+' '+calYear
  const firstDay=new Date(calYear,calMonth,1).getDay()
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate()
  const daysInPrev=new Date(calYear,calMonth,0).getDate()
  const today=new Date();const cells=[]
  for(let i=firstDay-1;i>=0;i--)cells.push({day:daysInPrev-i,other:true})
  for(let d=1;d<=daysInMonth;d++){const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();const logKey=new Date(calYear,calMonth,d).toLocaleDateString();cells.push({day:d,other:false,today:isToday,hasLog:(G.dayLog[logKey]||[]).length>0,logKey})}
  // BUG 12 FIX: old formula produced wrong numbers; trailing cells are days 1..N of next month
  let _nextDay=1
  while(cells.length%7!==0)cells.push({day:_nextDay++,other:true})
  const cd=document.getElementById('calDays');if(!cd)return
  cd.innerHTML=cells.map(c=>`<div class="cal-day${c.other?' other-month':''}${c.today?' today':''}" onclick="showDayLog('${c.logKey||''}')">`+`<div class="cal-day-num">${c.day}</div>${c.hasLog?'<div class="cal-dot"></div>':''}</div>`).join('')
}
function showDayLog(key){
  const log=G.dayLog[key]||[];const el=document.getElementById('dayLog2');if(!el)return
  if(!key||!log.length){el.innerHTML='<span style="color:var(--muted)">No quests cleared on this day.</span>';return}
  const d=new Date(key);el.innerHTML=`<div style="color:var(--cyan);margin-bottom:6px">${d.toDateString()}</div>`+log.map(q=>`<div style="margin-bottom:4px">✓ ${q}</div>`).join('')
}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}renderCalendar()}

function renderQuestsPanel(){
  const tasks=G.tasks;let filtered=[...tasks]
  if(questFilter==='active')filtered=filtered.filter(t=>!t.done)
  else if(questFilter==='done')filtered=filtered.filter(t=>t.done)
  else if(questFilter==='priority')filtered=filtered.filter(t=>t.priority&&!t.done)
  else if(SKEYS.includes(questFilter))filtered=filtered.filter(t=>t.attr===questFilter)
  const wilAutoTop=G.soldiers.willpower.rankIndex>=EK
  filtered.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1
    if(a.priority&&!b.priority)return -1;if(!a.priority&&b.priority)return 1
    if(wilAutoTop){if(a.daily&&!b.daily)return -1;if(!a.daily&&b.daily)return 1}
    return['S','A','B','C','D','E'].indexOf(a.diff)-['S','A','B','C','D','E'].indexOf(b.diff)
  })
  const cmdSlots=countPriorityAvail()
  const cmdNames=cmdSlots>0?SKEYS.filter(k=>G.soldiers[k].rankIndex>=CMD&&G.soldiers[k].priorityUsedToday!==new Date().toDateString()).map(k=>G.soldiers[k].name||SOLDIERS[k].classLabel).join(', '):''
  return`
  <div class="add-task-form">
    <div class="form-row">
      <input class="sl-input" id="taskInput" placeholder="Enter quest objective..." onkeydown="if(event.key==='Enter')addTask()"/>
      <input class="sl-input" id="taskTime2" type="time" style="width:100px"/>
      <button class="sl-btn" onclick="addTask()">+ ADD QUEST</button>
    </div>
    <div class="form-row-2">
      <select class="sl-select" id="taskDiff">${['E','D','C','B','A','S'].map(d=>`<option value="${d}">${d}-Rank</option>`).join('')}</select>
      <select class="sl-select" id="taskAttr">${SKEYS.map(k=>`<option value="${k}">${AFULL[k]}</option>`).join('')}</select>
      <select class="sl-select" id="taskCat">${['Health','Work','Study','Social','Spiritual','Personal'].map(c=>`<option>${c}</option>`).join('')}</select>
      <input class="sl-input" type="number" placeholder="Min" min="5" max="480" id="taskDur"/>
      <button class="sl-btn sl-btn-gold" onclick="addTask(true)">+ DAILY</button>
    </div>
  </div>
  ${cmdSlots>0?`<div class="priority-commander-banner"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">👑</span><span class="pcb-text">Commander's Decree — ${cmdNames} (2× XP Priority Quest)</span></div><span class="pcb-uses">${cmdSlots} USE${cmdSlots>1?'S':''} TODAY</span></div>`:''}
  <div class="filter-row">
    ${['all','active','priority','done'].map(f=>`<button class="filter-btn${questFilter===f?' active':''}" onclick="setQFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    ${SKEYS.map(k=>`<button class="filter-btn${questFilter===k?' active':''}" style="color:${ACOLORS[k]}" onclick="setQFilter('${k}')">${ALABELS[k]}</button>`).join('')}
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="section-title" style="margin-bottom:0">Active Quests</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">${filtered.length} quests</div>
  </div>
  <div class="quest-list">
    ${filtered.length===0?'<div class="empty-state"><div>⚔</div>No quests found — Register your objectives, Shadow Monarch.</div>':filtered.map(t=>{
      const ac=ACOLORS[t.attr]||'#1e90ff',al=ALABELS[t.attr]||'???',sol=SOLDIERS[t.attr]
      const realXP=computeXP(t)
      const cmdAvail=hasPriorityAvail()!==null
      const rankGemColor=t.diff==='S'?'#ffcc00':t.diff==='A'?'#ff6600':t.diff==='B'?'#aa44ff':t.diff==='C'?'#0099ff':'rgba(74,96,128,.6)'
return`<div class="quest-item${t.done?' done':''}${t.priority&&!t.done?' priority':''}" style="--ac:${t.priority?'#ff6600':t.accent}" data-rank="${t.diff}" onclick="if(!${t.done})completeTask(${t.id})">
        ${t.priority&&!t.done?'<div class="priority-glow"></div>':''}
        <div class="quest-check">${t.done?'✓':''}</div>
        <div style="min-width:0">
          <div class="quest-name">${t.name}${t.daily?'<span style="font-size:9px;color:var(--cyan);opacity:.7;margin-left:4px">[DAILY]</span>':''}</div>
          <div class="quest-meta">
            <span class="tag t${t.diff}">${t.diff}-RANK</span>
            <span class="attr-tag" style="color:${ac};border-color:${ac}50;background:${ac}12">${al} · ${sol?.classShort}</span>
            ${t.priority?'<span class="priority-tag">👑 PRIORITY</span>':''}
            <span class="xp-reward">${t.priority?`+${realXP} XP ×2`:`+${realXP} XP`}</span>
            ${!t.done&&!t.priority&&cmdAvail?`<button class="priority-mark-btn" onclick="event.stopPropagation();markPriority(${t.id})">👑 MARK</button>`:''}
          </div>
          ${(t.time||t.duration)?`<div class="quest-time-row">${t.time?`<span class="quest-time-chip">⏰ ${t.time}</span>`:''}${t.duration?`<span class="quest-dur-chip">⏱ ${t.duration} min</span>`:''}</div>`:''}

// ── WEB AUDIO SOUNDS ────────────────────────────────────────────────────────
// Lazy AudioContext: created on first user gesture to comply with iOS Safari
let _AC = null
function _getAC(){
  if(!_AC) _AC = new (window.AudioContext||window.webkitAudioContext)()
  return _AC
}
function _resumeAC(){ const ac=_getAC(); if(ac.state==='suspended') ac.resume() }

function playSound(type){
  _resumeAC()
  const _AC=_getAC()
  const t=_getAC().currentTime
  let o,g,o2,g2
  switch(type){
    case 'rankup':
      // Rankup MP3 is now played directly in window.showHunterRankup — no-op here
      break
    case 'quest':
      // Short satisfying chime — dungeon clear tone
      o=_getAC().createOscillator();g=_getAC().createGain()
      o.connect(g);g.connect(_getAC().destination)
      o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+.12)
      g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.5)
      o.start(t);o.stop(t+.5)
      o2=_getAC().createOscillator();g2=_getAC().createGain()
      o2.connect(g2);g2.connect(_getAC().destination)
      o2.frequency.setValueAtTime(660,t+.05);o2.frequency.exponentialRampToValueAtTime(1100,t+.2)
      g2.gain.setValueAtTime(.1,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+.4)
      o2.start(t+.05);o2.stop(t+.5)
      break
    case 'arise':
      // Deep shadow monarch sound — low drone + rising tone
      const drone=_getAC().createOscillator(),dg=_getAC().createGain()
      drone.connect(dg);dg.connect(_getAC().destination)
      drone.type='sawtooth';drone.frequency.setValueAtTime(40,t)
      dg.gain.setValueAtTime(.15,t);dg.gain.exponentialRampToValueAtTime(.001,t+2)
      drone.start(t);drone.stop(t+2)
      const rise=_getAC().createOscillator(),rgg=_getAC().createGain()
      rise.connect(rgg);rgg.connect(_getAC().destination)
      rise.frequency.setValueAtTime(110,t);rise.frequency.exponentialRampToValueAtTime(440,t+1.5)
      rgg.gain.setValueAtTime(.12,t+.3);rgg.gain.exponentialRampToValueAtTime(.001,t+2)
      rise.start(t+.3);rise.stop(t+2)
      break
    case 'title':
      // Mythic shimmer
      [523.25,659.25,783.99,1046.5].forEach((freq,i)=>{
        const oi=_getAC().createOscillator(),gi=_getAC().createGain()
        oi.type='sine';oi.connect(gi);gi.connect(_getAC().destination)
        oi.frequency.setValueAtTime(freq,t+i*.08)
        gi.gain.setValueAtTime(.15,t+i*.08);gi.gain.exponentialRampToValueAtTime(.001,t+i*.08+.6)
        oi.start(t+i*.08);oi.stop(t+i*.08+.7)
      })
      break
    case 'gate':
      // Portal whoosh
      const wh=_getAC().createOscillator(),wg=_getAC().createGain()
      wh.connect(wg);wg.connect(_getAC().destination)
      wh.type='sawtooth';wh.frequency.setValueAtTime(200,t);wh.frequency.exponentialRampToValueAtTime(80,t+.3)
      wg.gain.setValueAtTime(.1,t);wg.gain.exponentialRampToValueAtTime(.001,t+.4)
      wh.start(t);wh.stop(t+.4)
      break
    case 'midnight':
      // Clock toll
      [220,220,220].forEach((_,i)=>{
        const oi=_getAC().createOscillator(),gi=_getAC().createGain()
        oi.type='sine';oi.connect(gi);gi.connect(_getAC().destination)
        oi.frequency.setValueAtTime(220,t+i*.7)
        gi.gain.setValueAtTime(.2,t+i*.7);gi.gain.exponentialRampToValueAtTime(.001,t+i*.7+.6)
        oi.start(t+i*.7);oi.stop(t+i*.7+.7)
      })
      break
  }
}

function checkMidnightReset(){
  if(!G)return
  const today=new Date().toLocaleDateString()
  if(G._lastReset===today)return
  const dailies=G.tasks.filter(t=>t.daily)
  if(dailies.length===0){G._lastReset=today;return}
  const hadDone=dailies.some(t=>t.done)
  G.tasks=G.tasks.map(t=>t.daily?{...t,done:false,priority:false}:t)
  G._lastReset=today
  if(hadDone){
    playSound('midnight')
    showNotif({icon:'🌑',title:'SYSTEM RESET',body:'A new day dawns — daily quests reset',color:'#7b2fff',duration:5000})
    const fl=document.createElement('div')

    document.body.appendChild(fl);setTimeout(()=>fl.remove(),900)
  }
  saveState();render()
}

function triggerGateCrack(anchor){
  const wrap=document.getElementById('crackWrap'),svg=document.getElementById('crackSvg'),light=document.getElementById('crackLight');
  if(!wrap||!svg) return;
  const r=anchor?anchor.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0};
  wrap.style.transform=`translate(${r.left+r.width/2-150}px,${r.top+r.height/2-150}px)`;
  wrap.classList.add('active');svg.innerHTML='';
  const n=9+Math.floor(Math.random()*6);
  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2+(Math.random()-.5)*.5,len=38+Math.random()*78;
    const ex=Math.cos(ang)*len+(Math.random()-.5)*28,ey=Math.sin(ang)*len+(Math.random()-.5)*28;
    const tL=Math.sqrt(ex*ex+ey*ey);

// FEATURE 9 — STREAK FIRE (canvas-based)
// ══════════════════════════════════════════════════════════════════════════
function drawStreakFire(canvas,streak){
  const ctx=canvas.getContext('2d');if(!ctx)return;
  canvas.width=24;canvas.height=32;ctx.clearRect(0,0,24,32);if(streak<1)return;
  const s=Math.min(streak,30)/30;
  let inner,mid,outer;
  if(streak>=30){inner='#dd00ff';mid='rgba(80,0,130,.8)';outer='rgba(60,0,100,0)';}
  else if(streak>=7){inner='#44aaff';mid='rgba(0,60,180,.8)';outer='rgba(0,20,80,0)';}
  else{inner='#ffee44';mid='rgba(255,80,0,.8)';outer='rgba(200,30,0,0)';}
  const fH=10+s*18;
  for(let L=3;L>=0;L--){
    const g=ctx.createRadialGradient(12,32-L*1.5,0,12,32,fH*(1+L*.18));
    g.addColorStop(0,inner);g.addColorStop(.42,mid);g.addColorStop(1,outer);
    ctx.globalAlpha=.28+L*.16;ctx.beginPath();
    const w=6+L*2.2;
    ctx.moveTo(12-w,32);
    ctx.bezierCurveTo(12-w,32-fH*.32,12-w*.28,32-fH*.72,12,32-fH-L*1.8);
    ctx.bezierCurveTo(12+w*.28,32-fH*.72,12+w,32-fH*.32,12+w,32);
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
  }
  ctx.globalAlpha=1;
}

// REVAMP: PARALLAX DEPTH BACKGROUND CANVAS
// ══════════════════════════════════════════════════════════════════════════
(function initDepthCanvas(){
  const canvas=document.getElementById('depth-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H,mouseX=.5,mouseY=.5;

  // Nebula clouds
  const clouds=[];
  for(let i=0;i<18;i++){
    clouds.push({
      x:Math.random(),y:Math.random(),
      r:80+Math.random()*180,
      color:Math.random()>.5?[123,47,255]:[30,144,255],
      opacity:.015+Math.random()*.025,
      speed:.00008+Math.random()*.00015,
      phase:Math.random()*Math.PI*2,
    });
  }

  // Dungeon silhouettes (arch shapes at different depths)
  const arches=[];
  for(let i=0;i<6;i++){
    arches.push({
      x:.1+Math.random()*.8, depth:.3+Math.random()*.7,
      w:60+Math.random()*100, h:100+Math.random()*150,
      speed:.00003+Math.random()*.00008,
      phase:Math.random()*Math.PI*2,
    });
  }

  // Micro particles
  const particles=[];
  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random(),y:Math.random(),
      size:.5+Math.random()*2,
      color:Math.random()>.5?[123,47,255]:[30,144,255],
      opacity:.1+Math.random()*.25,
      speedX:(.5-Math.random())*.0002,
      speedY:-(.0001+Math.random()*.0002),
      wobble:Math.random()*Math.PI*2,
      wobbleSpeed:.01+Math.random()*.02,
    });
  }

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{mouseX=e.clientX/W;mouseY=e.clientY/H;});

  let t=0;
  function draw(){
    requestAnimationFrame(draw);
    ctx.clearRect(0,0,W,H);
    t+=.016;

    // Background gradient
    const grd=ctx.createRadialGradient(W*mouseX,H*mouseY,0,W*.5,H*.5,W*.8);
    grd.addColorStop(0,'rgba(15,8,40,.95)');
    grd.addColorStop(.5,'rgba(5,3,15,.98)');
    grd.addColorStop(1,'rgba(2,1,8,1)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

    // Nebula clouds (parallax with mouse)
    clouds.forEach(cl=>{
      const px=(cl.x+Math.sin(t*cl.speed+cl.phase)*.02+(mouseX-.5)*(.02*cl.depth))*W;
      const py=(cl.y+Math.cos(t*cl.speed*.7+cl.phase)*.015+(mouseY-.5)*(.015*cl.depth))*H;
      const g=ctx.createRadialGradient(px,py,0,px,py,cl.r);
      g.addColorStop(0,`rgba(${cl.color},${cl.opacity})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,cl.r,0,Math.PI*2);ctx.fill();
    });

    // Dungeon arches (mid layer)
    arches.forEach(a=>{
      const px=(a.x+Math.sin(t*a.speed+a.phase)*.01+(mouseX-.5)*(.01*a.depth))*W;
      const py=H-a.h*.3+(Math.cos(t*a.speed*.5+a.phase))*5;
      const op=a.depth*.06;
      ctx.strokeStyle=`rgba(123,47,255,${op})`;
      ctx.lineWidth=1;ctx.beginPath();
      // Gothic arch shape
      ctx.moveTo(px-a.w/2,H);
      ctx.lineTo(px-a.w/2,py+a.h*.2);
      ctx.bezierCurveTo(px-a.w/2,py,px,py-a.h*.3,px,py-a.h*.3);
      ctx.bezierCurveTo(px,py-a.h*.3,px+a.w/2,py,px+a.w/2,py+a.h*.2);
      ctx.lineTo(px+a.w/2,H);ctx.stroke();
    });

    // Micro particles (near layer)
    particles.forEach(p=>{
      p.wobble+=p.wobbleSpeed;
      p.x+=p.speedX+Math.sin(p.wobble)*.0001+(mouseX-.5)*.0002;
      p.y+=p.speedY;
      if(p.y<-.02)p.y=1.02;if(p.x<0)p.x=1;if(p.x>1)p.x=0;
      const px=p.x*W,py=p.y*H;
      ctx.fillStyle=`rgba(${p.color},${p.opacity})`;
      ctx.beginPath();ctx.arc(px,py,p.size,0,Math.PI*2);ctx.fill();
    });

    // Aurora sweep (top of screen)
    const auroraY=H*.08;
    const ag=ctx.createLinearGradient(0,auroraY-30,0,auroraY+30);
    ag.addColorStop(0,'rgba(0,0,0,0)');
    ag.addColorStop(.3,`rgba(123,47,255,${.012+Math.sin(t*.3)*.006})`);
    ag.addColorStop(.5,`rgba(30,144,255,${.015+Math.cos(t*.25)*.007})`);
    ag.addColorStop(.7,`rgba(123,47,255,${.008+Math.sin(t*.35)*.004})`);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag;ctx.fillRect(0,auroraY-30,W,60);
  }
  draw();
})();

  const pct=ri.xpNeeded===Infinity?100:Math.min(100,Math.round(G.xp/ri.xpNeeded*100));
  const turbulence=pct>90?'0.6s':pct>70?'1.2s':'2.4s';
  fill.querySelectorAll('.xp-liquid-wave,.xp-liquid-wave2').forEach(w=>{
    w.style.setProperty('--wave-speed',turbulence);
  });
  // Fire border when high XP
  const hunterBar=document.querySelector('.hunter-bar');
  if(hunterBar) hunterBar.classList.toggle('fire-border-active', pct>=90&&G.streak>=3);
}
setInterval(updateLiquidXP,2000);

// REVAMP: LIGHTNING ARC on S/A rank quest cards
// ══════════════════════════════════════════════════════════════════════════
function injectQuestLightning(){
  document.querySelectorAll('.quest-item[data-rank="S"],.quest-item[data-rank="A"]').forEach(card=>{
    if(card.querySelector('.lightning-svg'))return;
    const isSRank=card.dataset.rank==='S';
    const color=isSRank?'#ffcc00':'#ff6600';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','lightning-svg');
    svg.setAttribute('viewBox','0 0 100 40');
    svg.setAttribute('preserveAspectRatio','none');
    svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1';
    // Generate random lightning path
    const genPath=()=>{
      let d=`M0,${10+Math.random()*20}`,x=0,y=10+Math.random()*20;
      while(x<100){x+=5+Math.random()*15;y+=((Math.random()-.5)*20);y=Math.max(2,Math.min(38,y));d+=` L${x},${y}`;}
      return d;
    };
    svg.innerHTML=`<path d="${genPath()}" stroke="${color}" stroke-width="${isSRank?'.8':'.5'}" fill="none" opacity=".7"/>
      <path d="${genPath()}" stroke="${color}" stroke-width=".3" fill="none" opacity=".4"/>`;
    card.appendChild(svg);
  });
}

// REVAMP: DAMAGE NUMBER FEED
// ══════════════════════════════════════════════════════════════════════════
function addFeedEntry(text, color='#1e90ff', icon=''){
  const feed=document.getElementById('dmgFeed');if(!feed)return;
  const el=document.createElement('div');
  el.className='feed-entry';
  el.style.setProperty('--ec',color);
  el.textContent=icon+text;
  feed.insertBefore(el,feed.firstChild);
  setTimeout(()=>el.remove(),2600);
  // Keep max 6 entries
  while(feed.children.length>6)feed.removeChild(feed.lastChild);
}

// REVAMP: MONARCH AURA TENDRILS (idle creep)
// ══════════════════════════════════════════════════════════════════════════
let _monarchActive=false;
function showMonarchAura(){
  if(_monarchActive)return;_monarchActive=true;
  const el=document.getElementById('monarchAura');if(!el)return;
  el.innerHTML='';
  for(let i=0;i<16;i++){
    const t=document.createElement('div');
    t.className='tendril-path';
    const h=40+Math.random()*90;
    t.style.cssText=`left:${Math.random()*100}%;--td:${2+Math.random()*3}s;--tde:${Math.random()*2}s;--th:${h}px;width:${1+Math.random()*3}px;opacity:0`;
    el.appendChild(t);
    setTimeout(()=>{t.style.opacity='1';},10);
  }
  el.classList.add('active');
}
function hideMonarchAura(){
  if(!_monarchActive)return;_monarchActive=false;
  const el=document.getElementById('monarchAura');if(el)el.classList.remove('active');
  setTimeout(()=>{if(el)el.innerHTML='';},2100);
}
// Override idle timer to show aura at 30s (faster than arms-cross at 60s)
// Monarch aura integrates with existing resetIdleTimer via document event listeners
let _monarchTimer=null;
function startMonarchWatch(){
  clearTimeout(_monarchTimer);
  _monarchTimer=setTimeout(()=>{showMonarchAura();},30000);
}
document.addEventListener('click',()=>{hideMonarchAura();startMonarchWatch();});
document.addEventListener('keydown',()=>{hideMonarchAura();startMonarchWatch();});
startMonarchWatch();

// REVAMP: DUNGEON AMBIENCE (Web Audio)
// ══════════════════════════════════════════════════════════════════════════
let _ambienceNodes=null,_ambiencePlaying=false;
function toggleAmbience(){
  _resumeAC();
  const btn=document.getElementById('ambienceBtn');
  if(_ambiencePlaying){
    _stopAmbience();btn&&btn.classList.remove('playing');
  } else {
    _startAmbience();btn&&btn.classList.add('playing');
  }
  _ambiencePlaying=!_ambiencePlaying;
}
function _startAmbience(){
  const t=_AC.currentTime;
  // Deep cave drone
  const osc1=_AC.createOscillator(),g1=_AC.createGain();
  osc1.type='sawtooth';osc1.frequency.value=55;
  const lfo=_AC.createOscillator(),lg=_AC.createGain();
  lfo.frequency.value=.08;lg.gain.value=3;
  lfo.connect(lg);lg.connect(osc1.frequency);
  g1.gain.value=.04;osc1.connect(g1);g1.connect(_AC.destination);
  osc1.start(t);lfo.start(t);
  // Second drone (harmony)
  const osc2=_AC.createOscillator(),g2=_AC.createGain();
  osc2.type='sine';osc2.frequency.value=82;g2.gain.value=.025;
  osc2.connect(g2);g2.connect(_AC.destination);osc2.start(t);
  // Wind noise via filtered noise
  const buf=_AC.createBuffer(1,_AC.sampleRate*2,_AC.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
  const noise=_AC.createBufferSource();noise.buffer=buf;noise.loop=true;
  const filter=_AC.createBiquadFilter();filter.type='bandpass';filter.frequency.value=400;filter.Q.value=.5;
  const ng=_AC.createGain();ng.gain.value=.008;
  noise.connect(filter);filter.connect(ng);ng.connect(_AC.destination);noise.start(t);
  _ambienceNodes=[osc1,lfo,osc2,noise];
}
function _stopAmbience(){
  if(!_ambienceNodes)return;
  _ambienceNodes.forEach(n=>{try{n.stop();}catch(e){}});
  _ambienceNodes=null;
}

    injectQuestLightning();
    updateLiquidXP();

    if(G){
      const hunterBar=document.querySelector('.hunter-bar');
      if(hunterBar) hunterBar.classList.toggle('fire-border-active',G.streak>=7);
    }
  });
};

// REVAMP: HOOK completeTask for damage feed
// ══════════════════════════════════════════════════════════════════════════
const _prevCompleteRevamp=window.completeTask;
window.completeTask=function(taskId){
  const task=G&&G.tasks&&G.tasks.find(t=>t.id==taskId);
  _prevCompleteRevamp(taskId);
  if(task){
    const xp=computeXP(task);
    const colors={'S':'#ffcc00','A':'#ff6600','B':'#aa44ff','C':'#0099ff','D':'#00cc66','E':'#8a9ab0'};
    const ec=colors[task.diff]||'#1e90ff';
    addFeedEntry(`+${xp} EXP`,ec,'⚡ ');
    if(task.priority) addFeedEntry('PRIORITY BONUS','#ff6600','★ ');
    if(G.streak>1) setTimeout(()=>addFeedEntry(`STREAK ×${G.streak}`,'#00ddaa','🔥 '),400);
  }
};
window.addHunterXP&&(()=>{
  const _orig=addHunterXP;
  window.addHunterXP=function(amt){
    _orig(amt);
  };
})();

const RANK_KO = {
  'E':'이-랭크 각성자','D':'디-랭크 사냥꾼','C':'씨-랭크 사냥꾼',
  'B':'비-랭크 사냥꾼','A':'에이-랭크 사냥꾼','S':'에스-랭크 사냥꾼','National':'국가 최강 사냥꾼'
};
const RANK_IMG_COLORS = {
  'E':'#8a9ab0','D':'#00cc66','C':'#0099ff','B':'#aa44ff',
  'A':'#ff6600','S':'#ffcc00','National':'#ff2266'
};

// Load current rank image into idle corner
function updateIdleImage(){
  const iw=document.getElementById('idleJinwoo');if(!iw||!G)return;
  const rank=HUNTER_RANKS[G.rankIndex].rank;
  const src=RANK_IMGS[rank]||RANK_IMGS['E'];
  if(!iw.querySelector('img')){
    const img=document.createElement('img');
    img.src=src;img.alt='Hunter';
    iw.appendChild(img);
  } else {
    const img=iw.querySelector('img');
    if(img.src!==src){
      img.style.opacity='0';
      setTimeout(()=>{img.src=src;img.style.transition='opacity .4s';img.style.opacity='1';},200);
    }
  }
}

// Show full rank reveal cinematic
function showRankReveal(rankObj){
  // Create overlay if not exists
  let ov=document.getElementById('rankRevealOverlay');
  if(!ov){
    ov=document.createElement('div');
    ov.id='rankRevealOverlay';ov.className='rank-reveal-overlay';
    ov.innerHTML=`
      <div class="rank-reveal-frame" id="rankRevealFrame">
        <img class="rank-reveal-img" id="rankRevealImg" src="" alt="Rank Art"/>
        <div class="rank-reveal-caption">
          <span class="rank-reveal-label" id="rankRevealLabel"></span>
          <div class="rank-reveal-title" id="rankRevealTitle"></div>
          <span class="rank-reveal-ko" id="rankRevealKo"></span>
        </div>
        <div class="rank-reveal-close" onclick="closeRankReveal()">[ TAP TO CONTINUE ]</div>
      </div>`;
    document.body.appendChild(ov);
  }
  const rank=rankObj.rank;
  const src=RANK_IMGS[rank]||RANK_IMGS['S'];
  const color=RANK_IMG_COLORS[rank]||'#7b2fff';
  document.getElementById('rankRevealImg').src=src;
  document.getElementById('rankRevealLabel').textContent='— RANK BREAKTHROUGH —';
  document.getElementById('rankRevealTitle').textContent=rankObj.rank+'-RANK · '+rankObj.title.toUpperCase();
  document.getElementById('rankRevealTitle').style.setProperty('--rc',color+'cc');
  document.getElementById('rankRevealTitle').style.color=color;
  document.getElementById('rankRevealKo').textContent=RANK_KO[rank]||'';
  document.getElementById('rankRevealFrame').style.borderColor=color+'80';
  document.getElementById('rankRevealFrame').style.boxShadow=`0 0 80px ${color}40,0 0 160px ${color}15`;
  ov.classList.add('active');
  playSound('rankup');
  // Auto-close after 6s
  setTimeout(closeRankReveal, 6000);
}
window.closeRankReveal=function(){
  const ov=document.getElementById('rankRevealOverlay');if(ov)ov.classList.remove('active');
};

// Load combat image (current rank art) into slash overlay
function loadCombatImages(){
  if(!G)return;
  const rank=HUNTER_RANKS[G.rankIndex].rank;
  const src=RANK_IMGS[rank]||RANK_IMGS['E'];
  const jw=document.getElementById('jwFigure');
  if(jw&&!jw.querySelector('img')){
    const img=document.createElement('img');img.src=src;img.alt='Jin-Woo';
    jw.appendChild(img);
  }
  // Boss JW figure
  const bjw=document.getElementById('bossJwFig');
  if(bjw&&!bjw.querySelector('img')){
    // Use a higher-power image for boss battle
    const bsrc=RANK_IMGS['A']||src;
    const img=document.createElement('img');img.src=bsrc;img.alt='Jin-Woo';
    bjw.appendChild(img);
  }
}

// Update rank transform overlay with real image
const _origTriggerRankTransform=triggerRankTransformation;
window.triggerRankTransformation=function triggerRankTransformationImg(rankObj){
  // Inject image into rt-jinwoo
  const rt=document.getElementById('rtJinwoo');
  if(rt){
    rt.innerHTML='';
    const img=document.createElement('img');
    img.src=RANK_IMGS[rankObj.rank]||RANK_IMGS['S'];
    img.alt=rankObj.rank+' Rank';img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:top center;';
    rt.appendChild(img);
  }
  _origTriggerRankTransform(rankObj);
  // Show the full-screen rank reveal after the transform animation
  setTimeout(()=>showRankReveal(rankObj), 1800);
  // Update idle corner to new rank
  setTimeout(updateIdleImage, 2000);
}

// Override showHunterRankup to also update idle image
const _origShowHunterRankupImg=window.showHunterRankup;
window.showHunterRankup=function(ri){
  _origShowHunterRankupImg(ri);
  setTimeout(updateIdleImage, 2200);
};

// Boot: load current rank image
setTimeout(()=>{ updateIdleImage(); loadCombatImages(); }, 500);

// Re-load after render (in case DOM rebuilt)
const _prevRenderImg=window.render;
window.render=function(){
  _prevRenderImg();
  requestAnimationFrame(()=>{ updateIdleImage(); loadCombatImages(); });
};

</script>
