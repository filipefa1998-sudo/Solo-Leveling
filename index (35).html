<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>System Planner — Solo Leveling</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050810;--panel:#0a0f1e;--card:#0d1428;--border:#1a2a4a;
  --blue:#1e90ff;--blue-dim:#0a3a6e;--purple:#7b2fff;--cyan:#00d4ff;
  --gold:#ffd700;--gold-dim:#7a5a00;--green:#00ff88;--red:#ff3a3a;
  --text:#c8d8f8;--muted:#4a6080;
  --phy:#ff4455;--vit:#00ddaa;--int:#4488ff;--wil:#ffaa22;--cha:#dd44ff;--spi:#c8a0ff;
}
html,body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(123,47,255,.05),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(30,144,255,.05),transparent 50%);pointer-events:none;z-index:0}body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:0}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(30,144,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(30,144,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 12px 80px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ANIMATIONS */
@keyframes shimmer{0%{left:-60%}100%{left:120%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes buffPulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes notifBar{from{width:100%}to{width:0}}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}30%{opacity:1;transform:translateY(-20px) scale(1.15)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}
@keyframes lvlFlash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
@keyframes qEnter{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pAura{0%,100%{box-shadow:inset 0 0 0 1px rgba(255,102,0,0)}50%{box-shadow:inset 0 0 12px rgba(255,102,0,.12)}}
@keyframes sysAppear{from{opacity:0;letter-spacing:12px}to{opacity:1;letter-spacing:6px}}
@keyframes rLetterIn{0%{opacity:0;transform:scale(3);filter:blur(20px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
@keyframes tendrilRise{0%{height:0;opacity:0}30%{opacity:.8}100%{height:100vh;opacity:.6}}
@keyframes spFloat{0%{opacity:.9;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(var(--dy)) translateX(var(--dx)) scale(0)}}
@keyframes runeRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes runeFlick{0%,100%{opacity:.2}50%{opacity:.8}}
@keyframes divExpand{from{width:0;opacity:0}to{width:200px;opacity:1}}
@keyframes swOut{0%{transform:scale(0);opacity:1}100%{transform:scale(4);opacity:0}}
@keyframes rFlash{0%{opacity:.8;transform:scale(0)}100%{opacity:0;transform:scale(3)}}
@keyframes nameTendril{0%{height:0;opacity:0}100%{height:80vh;opacity:.7}}
@keyframes nameParticle{0%{opacity:0;transform:translateY(100vh) scale(0)}20%{opacity:.8}80%{opacity:.4}100%{opacity:0;transform:translateY(-20vh) scale(.3)}}
@keyframes silRise{from{opacity:0;transform:translateX(-50%) translateY(60px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes beamGrow{from{height:0;opacity:0}to{height:60vh;opacity:1}}
@keyframes nameFlash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes tuParticle{0%{transform:translateY(100vh) scale(0);opacity:0}20%{opacity:1}100%{transform:translateY(-10vh) scale(.5);opacity:0}}
@keyframes tuRingExpand{0%{width:0;height:0;opacity:1;top:50%;left:50%;transform:translate(-50%,-50%)}100%{width:500px;height:500px;opacity:0;top:50%;left:50%;transform:translate(-50%,-50%)}}
@keyframes mythicPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px rgba(255,34,102,.3)}}
@keyframes swReveal{0%{opacity:0;transform:scaleY(.9);filter:brightness(2)}100%{opacity:1;transform:scaleY(1);filter:brightness(1)}}
@keyframes swLineScan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
@keyframes abilityGlow{0%,100%{opacity:1}50%{opacity:.88}}
@keyframes sFlash{0%{opacity:.4}100%{opacity:0}}
@keyframes vigIn{from{opacity:0}to{opacity:1}}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:10px}
.logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--blue)}
.logo span{color:var(--gold)}
.date-display{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px}

/* BUFFS */
.buffs-bar{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:44px}
.buffs-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);flex-shrink:0}
.buff-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:9px;border:1px solid;animation:buffPulse 3s ease infinite}
.no-buffs{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);font-style:italic}

/* HUNTER BAR */
.hunter-bar{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:14px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center}
.rank-badge{width:52px;height:52px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:18px;font-weight:900;border:2px solid;position:relative;flex-shrink:0;transition:all .4s}
.rank-badge::after{content:'';position:absolute;inset:-4px;border-radius:8px;border:1px solid;opacity:.3}
.rE{color:#8a9ab0;border-color:#8a9ab0;background:rgba(138,154,176,.1)}.rE::after{border-color:#8a9ab0}
.rD{color:#00cc66;border-color:#00cc66;background:rgba(0,204,102,.1)}.rD::after{border-color:#00cc66}
.rC{color:#0099ff;border-color:#0099ff;background:rgba(0,153,255,.1)}.rC::after{border-color:#0099ff}
.rB{color:#aa44ff;border-color:#aa44ff;background:rgba(170,68,255,.1)}.rB::after{border-color:#aa44ff}
.rA{color:#ff6600;border-color:#ff6600;background:rgba(255,102,0,.1)}.rA::after{border-color:#ff6600}
.rS{color:#ffcc00;border-color:#ffcc00;background:rgba(255,204,0,.15);box-shadow:0 0 20px rgba(255,204,0,.3),inset 0 0 20px rgba(255,204,0,.05);animation:shadowPulse 3s ease infinite}.rS::after{border-color:#ffcc00}
.rN{color:#ff2266;border-color:#ff2266;background:rgba(255,34,102,.15);animation:monarchAura 2s ease infinite}.rN::after{border-color:#ff2266}
.hunter-name-text{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:white;margin-bottom:2px;cursor:pointer}
.hunter-active-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;margin-bottom:4px;transition:color .4s}
.hunter-rank-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.xp-label{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:3px}
.xp-bar-bg{height:8px;background:rgba(30,144,255,.08);border-radius:4px;border:1px solid rgba(30,144,255,.15);overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue));border-radius:4px;transition:width 1.2s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.xp-bar-fill::after{content:'';position:absolute;top:0;left:-60%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2.5s infinite}
.stat-pill{background:rgba(30,144,255,.08);border:1px solid rgba(30,144,255,.2);border-radius:4px;padding:3px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);white-space:nowrap}

/* DAILY PROGRESS */
.daily-progress-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.dp-header{display:flex;justify-content:space-between;margin-bottom:8px}
.dp-title{color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;font-size:11px}
.dp-count{font-family:'Orbitron',monospace;font-size:11px;color:var(--gold)}
.dp-track{height:8px;background:rgba(255,215,0,.08);border-radius:4px;border:1px solid rgba(255,215,0,.15);overflow:hidden}
.dp-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1)}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;overflow-x:auto}
.tab-btn{flex:1;padding:8px 6px;background:transparent;border:none;border-radius:6px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:rgba(30,144,255,.05)}
.tab-btn.active{background:rgba(30,144,255,.15);color:var(--blue);border:1px solid rgba(30,144,255,.3)}
.panel{display:none}.panel.active{display:block}
.section-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.section-title::before{content:'';display:block;width:3px;height:14px;background:var(--blue);border-radius:2px}

/* FORMS */
.add-task-form{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-bottom:8px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:center}
.sl-input,.sl-select{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;width:100%}
.sl-input:focus,.sl-select:focus{border-color:rgba(30,144,255,.5)}
.sl-select option{background:var(--card)}
.sl-btn{background:rgba(30,144,255,.15);border:1px solid rgba(30,144,255,.4);border-radius:6px;padding:8px 14px;color:var(--blue);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.sl-btn:hover{background:rgba(30,144,255,.25)}
.sl-btn:active{transform:scale(.97)}
.sl-btn-gold{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:var(--gold)}
.sl-btn-red{background:rgba(255,60,60,.1);border-color:rgba(255,60,60,.3);color:#ff6666;font-size:9px;padding:4px 10px}

/* FILTERS */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 9px;font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;font-weight:600}
.filter-btn:hover{border-color:rgba(30,144,255,.3);color:var(--text)}
.filter-btn.active{background:rgba(30,144,255,.1);border-color:rgba(30,144,255,.4);color:var(--blue)}

/* QUESTS */
.quest-list{display:flex;flex-direction:column;gap:8px}
.quest-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:grid;grid-template-columns:26px 1fr auto;gap:10px;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .3s;animation:qEnter .3s ease}
.quest-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,var(--blue))}
.quest-item:hover{border-color:rgba(30,144,255,.3)}
.quest-item.done{opacity:.5;border-color:rgba(0,255,136,.2)}
.quest-item.done::before{background:var(--green)}
.quest-item.priority{border-color:rgba(255,102,0,.5)!important;background:rgba(255,102,0,.04)!important}
.quest-item.priority::before{background:#ff6600!important}
.priority-glow{position:absolute;inset:0;border-radius:8px;pointer-events:none;animation:pAura 2s ease infinite}
.quest-check{width:26px;height:26px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .3s;flex-shrink:0}
.quest-item.done .quest-check{background:rgba(0,255,136,.15);border-color:var(--green);color:var(--green)}
.quest-name{font-size:13px;font-weight:600;color:white;margin-bottom:3px}
.quest-item.done .quest-name{text-decoration:line-through;color:var(--muted)}
.quest-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tag{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:1px}
.tE{background:rgba(138,154,176,.15);color:#8a9ab0;border:1px solid rgba(138,154,176,.3)}
.tD{background:rgba(0,204,102,.1);color:#00cc66;border:1px solid rgba(0,204,102,.3)}
.tC{background:rgba(0,153,255,.1);color:#0099ff;border:1px solid rgba(0,153,255,.3)}
.tB{background:rgba(170,68,255,.1);color:#aa44ff;border:1px solid rgba(170,68,255,.3)}
.tA{background:rgba(255,102,0,.1);color:#ff6600;border:1px solid rgba(255,102,0,.3)}
.tS{background:rgba(255,204,0,.12);color:#ffcc00;border:1px solid rgba(255,204,0,.4)}
.xp-reward{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold);background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);padding:2px 6px;border-radius:3px}
.attr-tag{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:.5px;border:1px solid;font-weight:700}
.priority-tag{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;border:1px solid rgba(255,102,0,.5);color:#ff6600;background:rgba(255,102,0,.1);font-weight:700}
.delete-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;opacity:.5;transition:all .2s}
.delete-btn:hover{color:var(--red);opacity:1}
.priority-mark-btn{background:rgba(255,102,0,.1);border:1px solid rgba(255,102,0,.3);border-radius:4px;padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:9px;color:#ff6600;cursor:pointer;transition:all .2s;white-space:nowrap}
.priority-commander-banner{background:rgba(255,102,0,.06);border:1px solid rgba(255,102,0,.3);border-radius:6px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.pcb-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:#ff8844}
.pcb-uses{font-family:'Orbitron',monospace;font-size:10px;color:#ff6600;background:rgba(255,102,0,.12);border:1px solid rgba(255,102,0,.3);border-radius:4px;padding:2px 8px}

/* ARMY */
.army-summary{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.army-stat{text-align:center}
.army-stat-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:white}
.army-stat-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;display:block;margin-top:2px}
.shadow-army-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.soldier-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0;position:relative;overflow:hidden;transition:border-color .3s}
.soldier-card-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.soldier-card-body{padding:16px}
.soldier-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.soldier-avatar{width:62px;height:62px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;flex-shrink:0}
.soldier-name-display{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;margin-bottom:2px}
.soldier-name-unnamed{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);font-style:italic;letter-spacing:1px;margin-bottom:2px}
.soldier-class-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.soldier-rank-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;border:1px solid;margin-bottom:4px}
.soldier-rank-dot{width:6px;height:6px;border-radius:50%}
.name-btn{background:rgba(170,68,255,.12);border:1px solid rgba(170,68,255,.4);border-radius:4px;padding:3px 10px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1px;color:#cc88ff;cursor:pointer;transition:all .2s;margin-top:5px;display:inline-block}
.name-btn:hover{background:rgba(170,68,255,.22)}
.soldier-xp-section{margin-bottom:12px}
.soldier-xp-header{display:flex;justify-content:space-between;margin-bottom:4px}
.soldier-xp-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px}
.soldier-xp-bg{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.soldier-xp-fill{height:100%;border-radius:4px;transition:width 1s;position:relative;overflow:hidden}
.soldier-xp-fill::after{content:'';position:absolute;top:0;left:-60%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2s infinite}
.soldier-kills{display:flex;gap:8px;padding:10px 0;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px}
.kill-stat{text-align:center;flex:1}
.kill-stat-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:white}
.kill-stat-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;display:block;margin-top:1px}

/* ABILITY TREE */
.ability-tree-header{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ability-tree-header::before{content:'';display:block;width:2px;height:10px;background:var(--muted);border-radius:1px}
.ability-row{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:6px;border:1px solid;margin-bottom:4px;transition:all .3s}
.ability-row.unlocked{animation:abilityGlow 3s ease infinite}
.ability-row.locked{opacity:.22;filter:grayscale(.9)}
.ability-tier-badge{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;border:1px solid;flex-shrink:0;letter-spacing:1px;margin-top:1px;white-space:nowrap}
.ability-icon{font-size:13px;flex-shrink:0;margin-top:1px;width:16px;text-align:center}
.ability-name{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.ability-text{font-family:'Share Tech Mono',monospace;font-size:9px;line-height:1.4}
.ability-active-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* TITLES */
.titles-intro{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.titles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.title-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;transition:all .3s}
.title-card.earned::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc);box-shadow:0 0 8px var(--tc)}
.title-card.locked{opacity:.38}
.title-icon{font-size:22px;flex-shrink:0}
.title-name{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:white;margin-bottom:3px;line-height:1.2}
.title-rarity{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:2px 7px;border-radius:3px;border:1px solid;display:inline-block;margin-bottom:4px}
.rarity-common{color:#8a9ab0;border-color:rgba(138,154,176,.3);background:rgba(138,154,176,.08)}
.rarity-rare{color:#0099ff;border-color:rgba(0,153,255,.3);background:rgba(0,153,255,.06)}
.rarity-epic{color:#aa44ff;border-color:rgba(170,68,255,.3);background:rgba(170,68,255,.06)}
.rarity-legendary{color:#ffcc00;border-color:rgba(255,204,0,.3);background:rgba(255,204,0,.06)}
.rarity-mythic{color:#ff2266;border-color:rgba(255,34,102,.3);background:rgba(255,34,102,.06);animation:mythicPulse 2s ease infinite}
.title-desc{font-family:'Rajdhani',sans-serif;font-size:12px;color:rgba(200,216,248,.7);margin-bottom:6px;line-height:1.4}
.title-condition{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.title-prog-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-bottom:5px}
.title-prog-fill{height:100%;border-radius:2px;transition:width .8s}
.title-prog-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:8px}
.title-earned-badge{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;padding:2px 8px;border-radius:3px;border:1px solid;position:absolute;top:12px;right:12px;letter-spacing:1px}
.title-equip-btn{border:1px solid;border-radius:4px;padding:4px 12px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;width:100%;background:transparent}
.title-equip-btn.locked-btn{border-color:var(--border);color:var(--muted);cursor:default}

/* STATUS WINDOW */
.status-window{position:relative;background:linear-gradient(180deg,rgba(0,8,30,.98),rgba(0,4,20,.99));border:1px solid rgba(30,144,255,.4);border-radius:10px;overflow:hidden;padding:0;box-shadow:0 0 40px rgba(30,144,255,.08),inset 0 0 60px rgba(30,144,255,.03)}
.sw-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(30,144,255,.015) 2px,rgba(30,144,255,.015) 3px);pointer-events:none;z-index:0}
.sw-corner{position:absolute;width:20px;height:20px;border-color:rgba(30,144,255,.6);border-style:solid;z-index:2}
.sw-corner.tl{top:8px;left:8px;border-width:2px 0 0 2px}.sw-corner.tr{top:8px;right:8px;border-width:2px 2px 0 0}
.sw-corner.bl{bottom:8px;left:8px;border-width:0 0 2px 2px}.sw-corner.br{bottom:8px;right:8px;border-width:0 2px 2px 0}
.sw-inner{position:relative;z-index:1;padding:24px}
.sw-header{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(30,144,255,.15)}
.sw-system-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:4px;color:rgba(30,144,255,.5);margin-bottom:6px}
.sw-hunter-name{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:white;margin-bottom:4px;letter-spacing:2px}
.sw-active-title{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;margin-bottom:8px}
.sw-rank-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.sw-rank-chip{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;padding:4px 14px;border-radius:4px;border:1px solid;letter-spacing:2px}
.sw-level-chip{font-family:'Orbitron',monospace;font-size:11px;color:var(--cyan);border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.06);padding:4px 14px;border-radius:4px;letter-spacing:2px}
.sw-days-chip{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--border);background:rgba(255,255,255,.02);padding:4px 14px;border-radius:4px}
.sw-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sw-stat-block{background:rgba(30,144,255,.04);border:1px solid rgba(30,144,255,.1);border-radius:6px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.sw-stat-name{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:var(--muted)}
.sw-stat-desc{font-family:'Rajdhani',sans-serif;font-size:11px;color:rgba(200,216,248,.6)}
.sw-stat-value{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:white;text-align:right}
.sw-stat-sub{font-family:'Share Tech Mono',monospace;font-size:9px;text-align:right;margin-top:1px}
.sw-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(30,144,255,.3),transparent);margin:16px 0}
.sw-attrs-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:rgba(30,144,255,.5);margin-bottom:12px;text-align:center}
.sw-attr-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sw-attr-name{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;color:var(--text);width:80px;flex-shrink:0}
.sw-attr-bar-bg{height:10px;background:rgba(255,255,255,.04);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.06);flex:1}
.sw-attr-bar-fill{height:100%;border-radius:5px;transition:width 1.5s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.sw-attr-bar-fill::after{content:'';position:absolute;top:0;left:-60%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
.sw-attr-value{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
.sw-attr-rank{font-family:'Share Tech Mono',monospace;font-size:8px;width:50px;text-align:right;flex-shrink:0;opacity:.7}
.sw-army-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:16px}
.sw-soldier-mini{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:8px 6px;text-align:center}
.sw-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid rgba(30,144,255,.1);flex-wrap:wrap;gap:6px}
.sw-footer-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:white}
.sw-footer-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;display:block;margin-top:1px}
.sw-reveal{animation:swReveal .8s cubic-bezier(.16,1,.3,1) both}
.sw-line-scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(30,144,255,.8),transparent);animation:swLineScan 1.5s ease .3s both}

/* TIMER */
.timer-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;text-align:center;margin-bottom:14px}
.timer-circle-wrap{position:relative;display:inline-block;margin-bottom:16px}
.timer-display{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:white;letter-spacing:4px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap}
.timer-label-txt{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;position:absolute;bottom:28%;left:50%;transform:translateX(-50%);white-space:nowrap}
.timer-controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.timer-presets{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.preset-btn{background:rgba(123,47,255,.1);border:1px solid rgba(123,47,255,.3);border-radius:5px;padding:5px 12px;color:#9a7aff;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s}
.preset-btn:hover{background:rgba(123,47,255,.2)}
.preset-btn.active{background:rgba(123,47,255,.25);border-color:rgba(123,47,255,.6)}
.progress-ring{transition:stroke-dashoffset .8s cubic-bezier(.16,1,.3,1)}

/* CALENDAR */
.calendar-grid{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-day-name{text-align:center;padding:8px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{aspect-ratio:1;border:1px solid rgba(30,144,255,.06);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;transition:background .2s;min-height:44px}
.cal-day:hover{background:rgba(30,144,255,.05)}
.cal-day.today{background:rgba(30,144,255,.1);border-color:rgba(30,144,255,.3)}
.cal-day.today .cal-day-num{color:var(--blue);font-weight:700}
.cal-day.other-month{opacity:.3}
.cal-day-num{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--gold)}

/* NOTIFICATIONS */
.sys-notif-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:300px}
.sys-notif{background:var(--panel);border-radius:6px;overflow:hidden;transform:translateX(120%);opacity:0;transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .4s ease;min-width:240px}
.sys-notif.show{transform:translateX(0);opacity:1}
.sys-notif.hide{transform:translateX(120%);opacity:0;transition:transform .3s ease-in,opacity .3s ease-in}
.sys-notif-inner{padding:10px 14px;display:flex;align-items:flex-start;gap:10px;position:relative;z-index:1}
.sys-notif-border{position:absolute;inset:0;border-radius:6px;border:1px solid;pointer-events:none}
.sys-notif-icon{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid}
.sys-notif-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.sys-notif-body{font-size:12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-weight:600;line-height:1.3}
.sys-notif-xp{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;margin-top:2px}
.sys-notif-progress{position:absolute;bottom:0;left:0;height:2px;animation:notifBar linear forwards}
.sys-notif-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.015) 3px,rgba(255,255,255,.015) 4px);border-radius:6px;pointer-events:none}
.xp-float{position:fixed;font-family:'Orbitron',monospace;font-weight:900;pointer-events:none;z-index:9997;animation:xpFloat 1.5s ease forwards}
.level-flash{position:fixed;inset:0;pointer-events:none;z-index:9996;animation:lvlFlash .6s ease forwards}

/* RANK UP */
.rankup-screen{position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.rankup-screen.active{pointer-events:all;opacity:1}
.rankup-vignette{position:absolute;inset:0;background:rgba(0,0,0,.92);animation:vigIn .4s ease forwards}
.rankup-shadow-bg{position:absolute;inset:0;overflow:hidden}
.shadow-tendril{position:absolute;bottom:0;border-radius:50% 50% 0 0;animation:tendrilRise 2s ease-out forwards}
.shadow-particle{position:absolute;border-radius:50%;animation:spFloat linear forwards}
.rankup-runes{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.rune-ring{position:absolute;border-radius:50%;border:1px solid;animation:runeRot linear infinite}
.rune-char{position:absolute;font-family:'Share Tech Mono',monospace;font-size:10px;animation:runeFlick 1.5s infinite}
.rankup-center{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center}
.rankup-sys-text{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:6px;color:rgba(123,47,255,.7);margin-bottom:16px;animation:sysAppear .6s ease .3s both}
.rankup-letter{font-family:'Orbitron',monospace;font-size:90px;font-weight:900;line-height:1;animation:rLetterIn .5s cubic-bezier(.16,1,.3,1) .5s both}
.rankup-rank-name{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;margin-top:12px;animation:fadeUp .5s ease .9s both}
.rankup-rank-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:rgba(200,216,248,.7);margin-top:6px;letter-spacing:2px;animation:fadeUp .5s ease 1.1s both}
.rankup-divider{width:0;height:1px;margin:16px auto;animation:divExpand .6s ease 1.3s both}
.rankup-stats{display:flex;gap:20px;margin-bottom:18px;animation:fadeUp .5s ease 1.5s both}
.rs-stat{text-align:center}
.rs-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:3px}
.rs-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:700}
.rankup-btn{background:transparent;border:1px solid;border-radius:6px;padding:10px 28px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s;animation:fadeUp .5s ease 1.8s both}
.rankup-btn:hover{transform:scale(1.03)}
.shockwave{position:absolute;border-radius:50%;border:2px solid;transform:scale(0);animation:swOut .8s ease forwards;pointer-events:none}
.rankup-flash{position:absolute;inset:-200px;background:white;border-radius:50%;animation:rFlash .15s ease forwards;pointer-events:none}

/* NAMING */
.naming-screen{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .5s}
.naming-screen.active{pointer-events:all;opacity:1}
.naming-bg{position:absolute;inset:0;background:rgba(0,0,0,.95);overflow:hidden}
.naming-tendril{position:absolute;bottom:0;background:linear-gradient(180deg,transparent 0%,rgba(80,0,160,.5) 50%,rgba(40,0,100,.9) 100%);border-radius:50% 50% 0 0;animation:nameTendril 1.5s ease-out forwards}
.naming-particle{position:absolute;border-radius:50%;background:rgba(123,47,255,.7);animation:nameParticle linear infinite}
.naming-rune-ring{position:absolute;border-radius:50%;border:1px solid rgba(123,47,255,.2);animation:runeRot linear infinite}
.naming-rune-char{position:absolute;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(123,47,255,.4);animation:runeFlick 2s infinite}
.naming-light-beam{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:2px;background:linear-gradient(180deg,transparent 0%,rgba(123,47,255,.8) 50%,rgba(200,150,255,1) 100%);animation:beamGrow 1.2s ease .2s both;transform-origin:bottom}
.naming-light-beam-wide{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;background:linear-gradient(180deg,transparent 0%,rgba(123,47,255,.06) 100%);animation:beamGrow 1.2s ease .4s both;transform-origin:bottom;clip-path:polygon(50% 0%,0% 100%,100% 100%)}
.naming-silhouette-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:180px;height:270px;animation:silRise 1s cubic-bezier(.16,1,.3,1) .3s both}
.naming-center{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;padding:20px;max-width:460px;width:90%}
.naming-sys-header{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:5px;color:rgba(123,47,255,.6);margin-bottom:18px;animation:sysAppear .8s ease .4s both}
.naming-question{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:rgba(200,216,248,.9);letter-spacing:2px;margin-bottom:6px;line-height:1.5;animation:fadeUp .6s ease .7s both}
.naming-class-display{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(123,47,255,.8);letter-spacing:2px;margin-bottom:24px;animation:fadeUp .6s ease .9s both}
.naming-divider{width:240px;height:1px;background:linear-gradient(90deg,transparent,rgba(123,47,255,.6),transparent);margin:0 auto 18px;animation:fadeUp .5s ease 1.1s both}
.naming-input{width:100%;background:rgba(0,0,0,.6);border:1px solid rgba(123,47,255,.5);border-radius:6px;padding:14px 20px;font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:white;text-align:center;letter-spacing:4px;outline:none;text-transform:uppercase;transition:border-color .3s,box-shadow .3s;caret-color:rgba(123,47,255,.8);margin-bottom:18px;animation:fadeUp .6s ease 1.1s both}
.naming-input:focus{border-color:rgba(123,47,255,.9);box-shadow:0 0 20px rgba(123,47,255,.3)}
.naming-input::placeholder{color:rgba(123,47,255,.3);font-size:12px;letter-spacing:3px}
.naming-confirm-btn{background:transparent;border:1px solid rgba(123,47,255,.6);border-radius:6px;padding:12px 36px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;color:#cc88ff;cursor:pointer;transition:all .3s;animation:fadeUp .5s ease 1.4s both}
.naming-confirm-btn:hover{border-color:rgba(123,47,255,1);box-shadow:0 0 20px rgba(123,47,255,.4);transform:scale(1.03)}
.naming-skip{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(74,96,128,.7);cursor:pointer;margin-top:14px;letter-spacing:1px;animation:fadeUp .5s ease 1.6s both;transition:color .2s}
.naming-skip:hover{color:var(--muted)}
.naming-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(255,255,255,.008) 4px,rgba(255,255,255,.008) 5px);pointer-events:none}

/* TITLE UNLOCK */
.title-unlock-screen{position:fixed;inset:0;z-index:10001;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .4s}
.title-unlock-screen.active{pointer-events:all;opacity:1}
.tu-bg{position:absolute;inset:0;background:rgba(0,0,0,.92);overflow:hidden}
.tu-particles{position:absolute;inset:0;overflow:hidden}
.tu-particle{position:absolute;border-radius:50%;animation:tuParticle linear forwards}
.tu-center{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;padding:20px;max-width:400px;width:90%}
.tu-sys-text{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:5px;color:rgba(255,215,0,.6);margin-bottom:16px;animation:sysAppear .8s ease .2s both}
.tu-icon{font-size:60px;margin-bottom:12px;animation:tuIconIn .5s cubic-bezier(.16,1,.3,1) .4s both}
@keyframes tuIconIn{0%{opacity:0;transform:scale(0) rotate(-20deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
.tu-title-name{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:2px;animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .7s both;line-height:1.2;text-align:center;padding:0 10px}
.tu-rarity{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;margin-top:8px;animation:fadeUp .5s ease .9s both}
.tu-desc{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:rgba(200,216,248,.8);margin-top:12px;line-height:1.5;animation:fadeUp .5s ease 1.1s both;padding:0 20px;text-align:center}
.tu-divider{width:0;height:1px;margin:16px auto;animation:divExpand .5s ease 1.3s both}
.tu-equip-prompt{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:rgba(200,216,248,.5);margin-bottom:16px;animation:fadeUp .5s ease 1.4s both}
.tu-btn-row{display:flex;gap:10px;animation:fadeUp .5s ease 1.6s both}
.tu-btn{background:transparent;border:1px solid;border-radius:6px;padding:10px 24px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s}
.tu-btn:hover{transform:scale(1.03)}
.tu-glow-ring{position:absolute;border-radius:50%;border:2px solid;animation:tuRingExpand 1.2s ease forwards;pointer-events:none}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--panel);border:1px solid rgba(30,144,255,.3);border-radius:12px;padding:40px;text-align:center;max-width:400px;width:100%}
.auth-logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:3px;color:var(--blue);margin-bottom:8px}
.auth-logo span{color:var(--gold)}
.auth-sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:32px}
.google-btn{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px 20px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;color:white;cursor:pointer;transition:all .3s;width:100%;justify-content:center}
.google-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.auth-note{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-top:16px}
.auth-error{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);margin-top:12px}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.loading-text{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:4px;color:var(--blue);animation:sysAppear 1s ease infinite alternate}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:12px;letter-spacing:1px;border:1px dashed var(--border);border-radius:8px;font-family:'Orbitron',monospace}

.gate-portal.open{opacity:1}
.gate-portal-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(123,47,255,.8);box-shadow:0 0 40px rgba(123,47,255,.6),inset 0 0 40px rgba(123,47,255,.3)}
.gate-portal-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;color:rgba(123,47,255,.9);white-space:nowrap}
@keyframes gateRingExpand{0%{width:0;height:0;opacity:1}60%{opacity:1}100%{width:200vmax;height:200vmax;opacity:0}}
@keyframes gateFlash{0%{opacity:0}30%{opacity:.15}100%{opacity:0}}
.gate-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(123,47,255,.4),transparent 70%);z-index:9997;pointer-events:none;animation:gateFlash .6s ease forwards}

/* ARISE EASTER EGG */
.arise-overlay{position:fixed;inset:0;z-index:99999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .5s}
.arise-overlay.active{opacity:1;pointer-events:all}
.arise-text{font-family:'Orbitron',monospace;font-size:clamp(32px,8vw,80px);font-weight:900;letter-spacing:8px;color:#ff2266;text-shadow:0 0 40px #ff2266,0 0 80px rgba(255,34,102,.5);animation:monarchAura 1.5s ease infinite}
.arise-sub{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:6px;color:rgba(255,34,102,.5);margin-top:12px;animation:fadeUp .6s ease .5s both}
.arise-close{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.2);margin-top:48px;letter-spacing:2px;cursor:pointer;transition:color .2s}
.arise-close:hover{color:rgba(255,255,255,.5)}
.arise-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
@keyframes ariseParticle{0%{transform:translateY(100vh) scale(0);opacity:0}20%{opacity:1}100%{transform:translateY(-20vh) scale(.5);opacity:0}}

body.sovereign{--bg:#030005;--panel:#080010;--card:#0a0015;--border:#2a0830;--blue:#ff2266;--blue-dim:#4a0020;--cyan:#ff4488;--gold:#ff2266;--gold-dim:#4a0010}
body.sovereign .logo{color:#ff2266}
body.sovereign .logo span{color:#ff2266}
body.sovereign .grid-bg{background-image:linear-gradient(rgba(255,34,102,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,34,102,.04) 1px,transparent 1px)}
body.sovereign body::before{background:radial-gradient(ellipse at 50% 50%,rgba(255,34,102,.08),transparent 60%)}
body.sovereign .tab-btn.active{background:rgba(255,34,102,.15);color:#ff2266;border-color:rgba(255,34,102,.4)}
body.sovereign .xp-bar-fill{background:linear-gradient(90deg,#4a0020,#ff2266)}
body.sovereign .sl-btn{background:rgba(255,34,102,.12);border-color:rgba(255,34,102,.4);color:#ff2266}
body.sovereign .section-title{color:#ff2266}
body.sovereign .section-title::before{background:#ff2266}
.sovereign-banner{position:fixed;bottom:0;left:0;right:0;z-index:9990;background:linear-gradient(90deg,rgba(255,34,102,.15),rgba(80,0,30,.4),rgba(255,34,102,.15));border-top:1px solid rgba(255,34,102,.3);padding:6px 16px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,34,102,.7);text-align:center;pointer-events:none;animation:buffPulse 3s ease infinite;display:none}
body.sovereign .sovereign-banner{display:block}

/* ── COMBAT SLASH OVERLAY ───────────────────────────────────────────── */
.combat-overlay{position:fixed;inset:0;z-index:99000;pointer-events:none;overflow:hidden}
.combat-overlay.active{pointer-events:none}

/* Jin-Woo silhouette */
.jw-silhouette{position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateX(-80px);
  width:120px;height:220px;opacity:0;filter:drop-shadow(0 0 20px rgba(123,47,255,.9))}
.jw-silhouette.enter{animation:jwEnter .35s cubic-bezier(.16,1,.3,1) forwards}
.jw-silhouette.slash{animation:jwSlash .3s ease forwards}
.jw-silhouette.exit{animation:jwExit .4s ease forwards}

/* Enemy silhouette */
.enemy-silhouette{position:absolute;bottom:0;right:50%;transform:translateX(50%) translateX(80px);
  width:100px;height:180px;opacity:0;filter:drop-shadow(0 0 15px rgba(255,50,50,.7))}
.enemy-silhouette.enter{animation:enemyEnter .3s ease .1s forwards}
.enemy-silhouette.shatter{animation:enemyShatter .5s ease forwards}

/* Slash effect */
.slash-line{position:absolute;top:30%;left:50%;width:0;height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),rgba(200,160,255,1),transparent);
  transform:translateX(-50%) rotate(-15deg);transform-origin:left center;
  border-radius:2px;filter:blur(.5px);opacity:0}
.slash-line.active{animation:slashDraw .15s ease forwards}
.slash-line-2{position:absolute;top:35%;left:50%;width:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(123,47,255,.7),transparent);
  transform:translateX(-50%) rotate(-10deg);transform-origin:left center;opacity:0}
.slash-line-2.active{animation:slashDraw2 .2s ease .05s forwards}

/* Impact flash */
.impact-flash{position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);
  width:0;height:0;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.9),rgba(123,47,255,.6),transparent 70%);
  opacity:0}
.impact-flash.active{animation:impactBurst .3s ease forwards}

/* Shatter particles */
.shatter-particle{position:absolute;border-radius:1px;opacity:0;
  background:rgba(255,60,60,.8);animation:shatterFly .6s ease forwards}

/* XP Rain */
.xp-rain-num{position:absolute;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
  color:#ffd700;text-shadow:0 0 10px #ffd700;opacity:0;pointer-events:none;
  animation:xpRain .9s cubic-bezier(.16,1,.3,1) forwards}

@keyframes jwEnter{
  0%{opacity:0;transform:translateX(-200px) translateX(-80px) scaleX(.8)}
  100%{opacity:1;transform:translateX(-50%) translateX(-80px) scaleX(1)}
}
@keyframes jwSlash{
  0%{transform:translateX(-50%) translateX(-80px) rotate(0deg) scaleX(1)}
  40%{transform:translateX(-50%) translateX(20px) rotate(-8deg) scaleX(1.05)}
  100%{transform:translateX(-50%) translateX(-80px) rotate(0deg) scaleX(1)}
}
@keyframes jwExit{
  0%{opacity:1;transform:translateX(-50%) translateX(-80px)}
  100%{opacity:0;transform:translateX(-50%) translateX(-80px) translateY(40px)}
}
@keyframes enemyEnter{
  0%{opacity:0;transform:translateX(50%) translateX(80px) scaleX(-1) translateX(40px)}
  100%{opacity:.85;transform:translateX(50%) translateX(80px) scaleX(-1)}
}
@keyframes enemyShatter{
  0%{opacity:.85;transform:translateX(50%) translateX(80px) scaleX(-1)}
  20%{opacity:.85;filter:drop-shadow(0 0 30px rgba(255,255,255,.9)) brightness(3)}
  60%{opacity:.4;transform:translateX(50%) translateX(80px) scaleX(-1) scale(1.1)}
  100%{opacity:0;transform:translateX(50%) translateX(140px) scaleX(-1) scale(1.3)}
}
@keyframes slashDraw{
  0%{opacity:0;width:0}40%{opacity:1}100%{opacity:.3;width:220px}
}
@keyframes slashDraw2{
  0%{opacity:0;width:0}50%{opacity:.7}100%{opacity:0;width:180px}
}
@keyframes impactBurst{
  0%{opacity:0;width:0;height:0}30%{opacity:1;width:120px;height:120px}
  100%{opacity:0;width:200px;height:200px}
}

  0%{opacity:1;transform:translate(0,0) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) rotate(var(--sr))}
}
@keyframes xpRain{
  0%{opacity:0;transform:translateY(0) scale(.5)}
  30%{opacity:1;transform:translateY(-30px) scale(1.2)}
  100%{opacity:0;transform:translateY(-100px) scale(.8)}

.rank-transform-overlay{position:fixed;inset:0;z-index:99500;pointer-events:none;

  transition:background .6s}
.rank-transform-overlay.active{background:rgba(0,0,8,.85)}

.rt-jinwoo{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:200px;height:360px;opacity:0}
.rt-jinwoo.show{animation:rtRise .7s cubic-bezier(.16,1,.3,1) .2s forwards}

.rt-tendril{position:absolute;bottom:0;left:50%;width:3px;border-radius:3px;
  background:linear-gradient(180deg,transparent,rgba(123,47,255,.8));
  transform-origin:bottom center;opacity:0}
.rt-tendril.rise{animation:rtTendrilRise var(--dur) ease var(--del) forwards}

/* Rank letter that morphs */
.rt-rank-letter{position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);

  text-align:center;letter-spacing:-4px}
.rt-rank-letter.reveal{animation:rtLetterReveal 1s cubic-bezier(.16,1,.3,1) .5s forwards}

/* Energy ring expanding from feet */
.rt-ring{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:0;border-radius:50%;border:2px solid rgba(123,47,255,.8);opacity:0}
.rt-ring.expand{animation:rtRingExpand 1.2s ease .3s forwards}

/* Scan lines effect */
.rt-scanlines{position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(123,47,255,.03) 3px,rgba(123,47,255,.04) 4px);
  pointer-events:none;opacity:0;animation:vigIn .3s ease forwards}

@keyframes rtRise{
  0%{opacity:0;transform:translateX(-50%) translateY(60px) scale(.9)}
  100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes rtTendrilRise{
  0%{height:0;opacity:0}30%{opacity:1}100%{height:var(--h);opacity:.7}
}
@keyframes rtLetterReveal{
  0%{opacity:0;transform:translate(-50%,-50%) scale(3);filter:blur(20px)}
  50%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
@keyframes rtRingExpand{
  0%{width:0;height:0;opacity:1;margin-bottom:0}
  100%{width:600px;height:600px;opacity:0;margin-bottom:-300px;margin-left:-300px}
}

/* ── IDLE CORNER PRESENCE ───────────────────────────────────────────── */
.idle-jinwoo{position:fixed;bottom:0;right:16px;width:72px;height:130px;z-index:8000;
  cursor:pointer;transition:transform .3s ease;filter:drop-shadow(0 0 8px rgba(123,47,255,.5))}
.idle-jinwoo:hover{transform:scale(1.08)}
.idle-jinwoo.nod{animation:idleNod .5s ease forwards}
.idle-jinwoo.fist{animation:idleFist .6s ease forwards}
.idle-jinwoo.arms-cross{animation:idleArmsCross .4s ease forwards}
.idle-speech{position:fixed;bottom:130px;right:16px;z-index:8001;
  background:rgba(10,15,40,.95);border:1px solid rgba(123,47,255,.5);border-radius:8px 8px 0 8px;
  padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(200,180,255,.9);max-width:160px;opacity:0;pointer-events:none;
  transform:translateY(8px);transition:all .3s;letter-spacing:.5px;line-height:1.5}
.idle-speech.show{opacity:1;transform:translateY(0)}
.idle-speech::after{content:'';position:absolute;bottom:-6px;right:14px;
  width:10px;height:6px;background:rgba(10,15,40,.95);clip-path:polygon(0 0,100% 0,50% 100%)}

@keyframes idleFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
@keyframes idleNod{
  0%{transform:translateY(0) rotate(0)}
  30%{transform:translateY(-4px) rotate(-4deg)}
  60%{transform:translateY(2px) rotate(3deg)}
  100%{transform:translateY(0) rotate(0)}
}
@keyframes idleFist{
  0%{transform:translateY(0) scale(1)}
  25%{transform:translateY(-12px) scale(1.06)}
  60%{transform:translateY(-8px) scale(1.08)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes idleArmsCross{
  0%{transform:rotate(0)}
  50%{transform:rotate(-2deg) translateX(-3px)}
  100%{transform:rotate(0)}
}

// ── GAME STATE ───────────────────────────────────────────────────────────────
let G = null // global state
const SAVE_KEY = 'sl_hunter_data'
let saveTimer = null

function loadState(){
  try{const raw=localStorage.getItem(SAVE_KEY);G=raw?{...makeDefault(),...JSON.parse(raw)}:makeDefault()}
  catch(e){G=makeDefault()}
  render()
}

function saveState(){
  if(!G)return
  clearTimeout(saveTimer)
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(G))}catch(e){console.error(e)}
  },800)
}

function setState(fn){
  G=typeof fn==='function'?fn(G):fn
  saveState()
  render()
}

// ── XP ENGINE ───────────────────────────────────────────────────────────────
function getXPMult(){
  let m=1
  SKEYS.forEach(k=>{if(G.soldiers[k].rankIndex>=GEN)m+=0.1})
  if(G.soldiers.willpower.rankIndex>=GM&&G.streak>0)m*=Math.pow(1.05,Math.min(G.streak,10))
  return parseFloat(m.toFixed(2))
}
function computeXP(task){
  const base=XP_RANK[task.diff];const sol=G.soldiers[task.attr];let xp=base
  if(sol.rankIndex>=0)xp+=1
  if(sol.rankIndex>=1)xp=Math.round(xp*1.2)
  if(task.attr==='intellect'&&sol.rankIndex>=2&&(task.category==='Study'||task.category==='Work'))xp+=5
  if(task.attr==='charisma'&&sol.rankIndex>=2&&task.category==='Social')xp+=8
  if(task.attr==='intellect'&&sol.rankIndex>=GM)xp*=3
  if(task.attr==='charisma'&&sol.rankIndex>=GM)xp*=2
  if(task.priority)xp*=2
  if(task.attr==='spiritual'&&sol.rankIndex>=2&&task.morningBonus)xp*=2
  return Math.round(xp*getXPMult())
}
function checkTitles(){
  const newOnes=ALL_TITLES.filter(t=>!G.earnedTitles.includes(t.id)&&t.check(G))
  if(newOnes.length){
    G.earnedTitles=[...G.earnedTitles,...newOnes.map(t=>t.id)]
    newOnes.forEach((t,i)=>setTimeout(()=>showTitleUnlock(t),i*4500))
  }
}
function addHunterXP(amount){
  const final=Math.round(amount*getXPMult())
  G.xp+=final;G.totalXP+=final
  spawnXPFloat('+'+final+' EXP','#c8a0ff')
  const cur=HUNTER_RANKS[G.rankIndex]
  if(G.xp>=cur.xpNeeded&&G.rankIndex<HUNTER_RANKS.length-1){
    G.xp-=cur.xpNeeded;G.level++;G.rankIndex++
    const nr=HUNTER_RANKS[G.rankIndex]
    G.rankHistory=[{rank:nr.rank,title:nr.title,level:G.level,date:new Date().toLocaleDateString()},...(G.rankHistory||[])]
    const fl=document.createElement('div');fl.className='level-flash';fl.style.background='rgba(30,144,255,.15)';document.body.appendChild(fl);setTimeout(()=>fl.remove(),700)
    setTimeout(()=>showHunterRankup(nr),800)
    showNotif({icon:'↑',title:'LEVEL UP',body:'Hunter Level '+G.level+' achieved',color:'#1e90ff',duration:2500})
  }
}
function addSoldierXPFn(attrKey,amount){
  const sol=G.soldiers[attrKey]
  sol.xp+=amount;sol.questsCompleted++;sol.kills++
  G.attrs[attrKey]=Math.min(100,(G.attrs[attrKey]||0)+amount/8)
  G.attrCounts[attrKey]=(G.attrCounts[attrKey]||0)+1
  const cur=SOLDIER_RANKS[sol.rankIndex]
  if(sol.xp>=cur.xpNeeded&&sol.rankIndex<SOLDIER_RANKS.length-1){
    sol.xp-=cur.xpNeeded;sol.rankIndex++
    const nr=SOLDIER_RANKS[sol.rankIndex]
    if(sol.rankIndex===EK&&!sol.named){setTimeout(()=>openNaming(attrKey),800)}
    else showNotif({icon:SOLDIERS[attrKey].icon,title:'SOLDIER EVOLVED',body:SOLDIERS[attrKey].classLabel+' → '+nr.name,color:SOLDIERS[attrKey].color,duration:3000})
    checkTitles()
  }
}
function updateStreak(){
  const today=new Date().toLocaleDateString()
  if(G.lastDay===today)return
  const yest=new Date(Date.now()-86400000).toLocaleDateString()
  const shield=G.soldiers.physique.rankIndex>=EK
  if(G.lastDay===yest)G.streak=(G.streak||0)+1
  else if(shield&&G.streakShieldUsed!==today){G.streakShieldUsed=today;showNotif({icon:'🔰',title:'SHIELD WALL',body:'Warlord protected your streak!',color:'#ff4455',duration:4000})}

function completeTask(taskId){
  const task=G.tasks.find(t=>t.id===taskId)
  if(!task||task.done)return
  const xpE=computeXP(task)
  task.done=true;task.xp=xpE
  G.completedTotal++;if(task.diff==='S')G.sRankCount++
  const now=new Date()
  if(now.getHours()<12){const key='mb_'+now.toLocaleDateString();G._mb=G._mb||{};G._mb[key]=(G._mb[key]||0)+1;if(G._mb[key]>(G.morningBurstRecord||0))G.morningBurstRecord=G._mb[key]}
  if(task.attr==='spiritual'&&now.getHours()<9)G.morningSpiritual=(G.morningSpiritual||0)+1
  G.attrCounts[task.attr]=(G.attrCounts[task.attr]||0)+1
  G.attrs[task.attr]=Math.min(100,(G.attrs[task.attr]||0)+xpE/8)
  const today=new Date().toLocaleDateString()
  G.dayLog[today]=[...(G.dayLog[today]||[]),`[${ALABELS[task.attr]}${task.priority?' ★':''}] ${task.name}`]
  updateStreak()
  const dTasks=G.tasks.filter(t=>t.daily),dDone=G.tasks.filter(t=>t.daily&&t.done).length
  if(G.soldiers.willpower.rankIndex>=EK&&dTasks.length>0&&dDone===dTasks.length){G.dailyCompleteStreak=(G.dailyCompleteStreak||0)+1;G.xp+=75;G.totalXP+=75;showNotif({icon:'🏅',title:'RITUAL MASTER',body:'All daily quests cleared — +75 XP!',color:'#ffaa22',duration:3500})}
  showNotif({icon:task.priority?'👑':SOLDIERS[task.attr].icon,title:task.priority?'PRIORITY CLEARED':'QUEST CLEARED',body:SOLDIERS[task.attr].classLabel+' grows stronger',xp:xpE,color:task.priority?'#ff6600':ACOLORS[task.attr],duration:task.diff==='S'?4000:3000})
  addHunterXP(xpE);addSoldierXPFn(task.attr,xpE);checkTitles();saveState();render()
}
function markPriority(taskId){
  const today=new Date().toDateString()
  const task=G.tasks.find(t=>t.id===taskId);if(!task||task.done)return
  if(task.priority){task.priority=false;saveState();render();return}
  const avail=hasPriorityAvail()
  if(!avail){showNotif({icon:'!',title:'NO PRIORITY SLOTS',body:'All Commander soldiers used their Priority mark today',color:'#ff6600',duration:3000});return}
  G.soldiers[avail].priorityUsedToday=today;task.priority=true
  showNotif({icon:'👑',title:'PRIORITY MARKED',body:(G.soldiers[avail].name||SOLDIERS[avail].classLabel)+' marks this quest — 2× XP',color:'#ff6600',duration:3000})
  saveState();render()
}

  const diff=document.getElementById('taskDiff').value
  const attr=document.getElementById('taskAttr').value
  const cat=document.getElementById('taskCat').value

  const accentMap={E:'#8a9ab0',D:'#00cc66',C:'#0099ff',B:'#aa44ff',A:'#ff6600',S:'#ffcc00'}
  const now=new Date()
  const task={id:Date.now()+Math.random(),name,diff,attr,category:cat,time,daily,done:false,priority:false,accent:accentMap[diff],morningBonus:attr==='spiritual'&&now.getHours()<9}
  task.xp=computeXP(task)
  G.tasks.push(task);nameEl.value='';showNotif({icon:SOLDIERS[attr].icon,title:'QUEST REGISTERED',body:name,color:ACOLORS[attr],duration:2000})
  saveState();render()
}

function onSessionComplete(mins,label){
  let xpE=mins*2
  if(G.soldiers.vitality.rankIndex>=GEN)xpE=Math.round(xpE*1.5)
  if(G.soldiers.vitality.rankIndex>=EK)xpE+=5

}

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth()
function renderCalendar(){
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December']
  const ct=document.getElementById('calMonthTitle');if(ct)ct.textContent=MONTHS[calMonth]+' '+calYear
  const firstDay=new Date(calYear,calMonth,1).getDay()
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate()
  const daysInPrev=new Date(calYear,calMonth,0).getDate()
  const today=new Date();const cells=[]
  for(let i=firstDay-1;i>=0;i--)cells.push({day:daysInPrev-i,other:true})
  for(let d=1;d<=daysInMonth;d++){const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();const logKey=new Date(calYear,calMonth,d).toLocaleDateString();cells.push({day:d,other:false,today:isToday,hasLog:(G.dayLog[logKey]||[]).length>0,logKey})}
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1,other:true})
  const cd=document.getElementById('calDays');if(!cd)return
  cd.innerHTML=cells.map(c=>`<div class="cal-day${c.other?' other-month':''}${c.today?' today':''}" onclick="showDayLog('${c.logKey||''}')">`+`<div class="cal-day-num">${c.day}</div>${c.hasLog?'<div class="cal-dot"></div>':''}</div>`).join('')
}
function showDayLog(key){
  const log=G.dayLog[key]||[];const el=document.getElementById('dayLog2');if(!el)return
  if(!key||!log.length){el.innerHTML='<span style="color:var(--muted)">No quests cleared on this day.</span>';return}
  const d=new Date(key);el.innerHTML=`<div style="color:var(--cyan);margin-bottom:6px">${d.toDateString()}</div>`+log.map(q=>`<div style="margin-bottom:4px">✓ ${q}</div>`).join('')
}

function switchTab(t){activeTab=t;render()}

function renderQuestsPanel(){
  const tasks=G.tasks;let filtered=[...tasks]
  if(questFilter==='active')filtered=filtered.filter(t=>!t.done)
  else if(questFilter==='done')filtered=filtered.filter(t=>t.done)
  else if(questFilter==='priority')filtered=filtered.filter(t=>t.priority&&!t.done)
  else if(SKEYS.includes(questFilter))filtered=filtered.filter(t=>t.attr===questFilter)
  const wilAutoTop=G.soldiers.willpower.rankIndex>=EK
  filtered.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1
    if(a.priority&&!b.priority)return -1;if(!a.priority&&b.priority)return 1
    if(wilAutoTop){if(a.daily&&!b.daily)return -1;if(!a.daily&&b.daily)return 1}
    return['S','A','B','C','D','E'].indexOf(a.diff)-['S','A','B','C','D','E'].indexOf(b.diff)
  })
  const cmdSlots=countPriorityAvail()
  const cmdNames=cmdSlots>0?SKEYS.filter(k=>G.soldiers[k].rankIndex>=CMD&&G.soldiers[k].priorityUsedToday!==new Date().toDateString()).map(k=>G.soldiers[k].name||SOLDIERS[k].classLabel).join(', '):''
  return`
  <div class="add-task-form">
    <div class="form-row">
      <input class="sl-input" id="taskInput" placeholder="Enter quest objective..." onkeydown="if(event.key==='Enter')addTask()"/>
      <input class="sl-input" id="taskTime2" type="time" style="width:100px"/>
      <button class="sl-btn" onclick="addTask()">+ ADD QUEST</button>
    </div>
    <div class="form-row-2">
      <select class="sl-select" id="taskDiff">${['E','D','C','B','A','S'].map(d=>`<option value="${d}">${d}-Rank</option>`).join('')}</select>
      <select class="sl-select" id="taskAttr">${SKEYS.map(k=>`<option value="${k}">${AFULL[k]}</option>`).join('')}</select>
      <select class="sl-select" id="taskCat">${['Health','Work','Study','Social','Spiritual','Personal'].map(c=>`<option>${c}</option>`).join('')}</select>
      <input class="sl-input" type="number" placeholder="Min" min="5" max="480" id="taskDur"/>
      <button class="sl-btn sl-btn-gold" onclick="addTask(true)">+ DAILY</button>
    </div>
  </div>
  ${cmdSlots>0?`<div class="priority-commander-banner"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">👑</span><span class="pcb-text">Commander's Decree — ${cmdNames} (2× XP Priority Quest)</span></div><span class="pcb-uses">${cmdSlots} USE${cmdSlots>1?'S':''} TODAY</span></div>`:''}
  <div class="filter-row">
    ${['all','active','priority','done'].map(f=>`<button class="filter-btn${questFilter===f?' active':''}" onclick="setQFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
    ${SKEYS.map(k=>`<button class="filter-btn${questFilter===k?' active':''}" style="color:${ACOLORS[k]}" onclick="setQFilter('${k}')">${ALABELS[k]}</button>`).join('')}
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="section-title" style="margin-bottom:0">Active Quests</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">${filtered.length} quests</div>
  </div>
  <div class="quest-list">
    ${filtered.length===0?'<div class="empty-state"><div>⚔</div>No quests found — Register your objectives, Shadow Monarch.</div>':filtered.map(t=>{
      const ac=ACOLORS[t.attr]||'#1e90ff',al=ALABELS[t.attr]||'???',sol=SOLDIERS[t.attr]
      const realXP=computeXP(t)
      const cmdAvail=hasPriorityAvail()!==null
      return`<div class="quest-item${t.done?' done':''}${t.priority&&!t.done?' priority':''}" style="--ac:${t.priority?'#ff6600':t.accent}" onclick="if(!${t.done})completeTask(${t.id})">
        ${t.priority&&!t.done?'<div class="priority-glow"></div>':''}
        <div class="quest-check">${t.done?'✓':''}</div>
        <div style="min-width:0">
          <div class="quest-name">${t.name}${t.daily?'<span style="font-size:9px;color:var(--cyan);opacity:.7;margin-left:4px">[DAILY]</span>':''}</div>
          <div class="quest-meta">
            <span class="tag t${t.diff}">${t.diff}-RANK</span>
            <span class="attr-tag" style="color:${ac};border-color:${ac}50;background:${ac}12">${al} · ${sol?.classShort}</span>
            ${t.priority?'<span class="priority-tag">👑 PRIORITY</span>':''}
            ${t.morningBonus&&!t.done?'<span class="tag" style="background:rgba(200,160,255,.08);color:#c8a0ff;border:1px solid rgba(200,160,255,.2)">🌅 DAWN</span>':''}
            <span class="xp-reward">${t.priority?`+${realXP} XP ×2`:`+${realXP} XP`}</span>
            ${!t.done&&!t.priority&&cmdAvail?`<button class="priority-mark-btn" onclick="event.stopPropagation();markPriority(${t.id})">👑 MARK</button>`:''}
          </div>
        </div>
        <button class="delete-btn" onclick="event.stopPropagation();deleteTask(${t.id})">✕</button>
      </div>`
    }).join('')}
  </div>`
}

function triggerCombatSlash(xpAmount, isSRank){
  const ov = document.getElementById('combatOverlay');
  const jw = document.getElementById('jwFigure');
  const en = document.getElementById('enemyFigure');
  const sl = document.getElementById('slashLine');
  const sl2 = document.getElementById('slashLine2');

  // Reset
  [jw,en,sl,sl2,flash].forEach(el=>el.className=el.className.replace(/ (enter|slash|exit|shatter|active)/g,''));

  // Sequence
  setTimeout(()=>{ jw.classList.add('enter'); en.classList.add('enter'); }, 0);

// ── FEATURE 1: SOUNDS ─────────────────────────────────────────────────────────

// ── WEB AUDIO SOUNDS ────────────────────────────────────────────────────────
const _AC = new (window.AudioContext||window.webkitAudioContext)()
function _resumeAC(){ if(_AC.state==='suspended') _AC.resume() }

function playSound(type){
  _resumeAC()
  const t=_AC.currentTime
  let o,g,o2,g2
  switch(type){
    case 'quest':
      // Short satisfying chime — dungeon clear tone
      o=_AC.createOscillator();g=_AC.createGain()
      o.connect(g);g.connect(_AC.destination)
      o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+.12)
      g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.5)
      o.start(t);o.stop(t+.5)
      // Harmony
      o2=_AC.createOscillator();g2=_AC.createGain()
      o2.connect(g2);g2.connect(_AC.destination)
      o2.frequency.setValueAtTime(660,t+.05);o2.frequency.exponentialRampToValueAtTime(1100,t+.2)
      g2.gain.setValueAtTime(.1,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+.4)
      o2.start(t+.05);o2.stop(t+.5)
      break
    case 'rankup':
      // Epic ascending fanfare
      [261.63,329.63,392,523.25,659.25].forEach((freq,i)=>{
        const oi=_AC.createOscillator(),gi=_AC.createGain()
        oi.connect(gi);gi.connect(_AC.destination)
        oi.type='sine'
        oi.frequency.setValueAtTime(freq,t+i*.1)
        gi.gain.setValueAtTime(.22,t+i*.1);gi.gain.exponentialRampToValueAtTime(.001,t+i*.1+.4)
        oi.start(t+i*.1);oi.stop(t+i*.1+.5)
      })
      // Low rumble
      const rumble=_AC.createOscillator(),rg=_AC.createGain()
      rumble.connect(rg);rg.connect(_AC.destination)
      rumble.type='sawtooth';rumble.frequency.setValueAtTime(60,t)
      rg.gain.setValueAtTime(.08,t);rg.gain.exponentialRampToValueAtTime(.001,t+1)
      rumble.start(t);rumble.stop(t+1)
      break
    case 'arise':
      // Deep shadow monarch sound — low drone + rising tone
      const drone=_AC.createOscillator(),dg=_AC.createGain()
      drone.connect(dg);dg.connect(_AC.destination)
      drone.type='sawtooth';drone.frequency.setValueAtTime(40,t)
      dg.gain.setValueAtTime(.15,t);dg.gain.exponentialRampToValueAtTime(.001,t+2)
      drone.start(t);drone.stop(t+2)
      const rise=_AC.createOscillator(),rgg=_AC.createGain()
      rise.connect(rgg);rgg.connect(_AC.destination)
      rise.frequency.setValueAtTime(110,t);rise.frequency.exponentialRampToValueAtTime(440,t+1.5)
      rgg.gain.setValueAtTime(.12,t+.3);rgg.gain.exponentialRampToValueAtTime(.001,t+2)
      rise.start(t+.3);rise.stop(t+2)
      break
    case 'title':
      // Mythic shimmer
      [523.25,659.25,783.99,1046.5].forEach((freq,i)=>{
        const oi=_AC.createOscillator(),gi=_AC.createGain()
        oi.type='sine';oi.connect(gi);gi.connect(_AC.destination)
        oi.frequency.setValueAtTime(freq,t+i*.08)
        gi.gain.setValueAtTime(.15,t+i*.08);gi.gain.exponentialRampToValueAtTime(.001,t+i*.08+.6)
        oi.start(t+i*.08);oi.stop(t+i*.08+.7)
      })
      break
    case 'gate':
      // Portal whoosh
      const wh=_AC.createOscillator(),wg=_AC.createGain()
      wh.connect(wg);wg.connect(_AC.destination)
      wh.type='sawtooth';wh.frequency.setValueAtTime(200,t);wh.frequency.exponentialRampToValueAtTime(80,t+.3)
      wg.gain.setValueAtTime(.1,t);wg.gain.exponentialRampToValueAtTime(.001,t+.4)
      wh.start(t);wh.stop(t+.4)
      break
    case 'midnight':
      // Clock toll
      [220,220,220].forEach((_,i)=>{
        const oi=_AC.createOscillator(),gi=_AC.createGain()
        oi.type='sine';oi.connect(gi);gi.connect(_AC.destination)
        oi.frequency.setValueAtTime(220,t+i*.7)
        gi.gain.setValueAtTime(.2,t+i*.7);gi.gain.exponentialRampToValueAtTime(.001,t+i*.7+.6)
        oi.start(t+i*.7);oi.stop(t+i*.7+.7)
      })
      break
  }
}

function triggerArise(){
  const ov=document.getElementById('ariseOverlay');if(!ov)return
  playSound('arise')
  const ap=document.getElementById('ariseParticles');if(ap){ap.innerHTML='';for(let i=0;i<40;i++){const p=document.createElement('div');const s=2+Math.random()*6;p.style.cssText=`position:absolute;width:${s}px;height:${s}px;border-radius:50%;background:rgba(255,34,102,${.4+Math.random()*.5});left:${Math.random()*100}%;animation:ariseParticle ${2+Math.random()*3}s ease ${Math.random()*1}s both`;ap.appendChild(p)}}
  ov.classList.add('active')
  _ariseBuffer=''
}
function closeArise(){
  const ov=document.getElementById('ariseOverlay');if(ov)ov.classList.remove('active')
}

// ── FEATURE 4: MIDNIGHT DAILY QUEST RESET ─────────────────────────────────────
function checkMidnightReset(){
  if(!G)return
  const today=new Date().toLocaleDateString()
  if(G._lastReset===today)return
  const dailies=G.tasks.filter(t=>t.daily)
  if(dailies.length===0){G._lastReset=today;return}
  const hadDone=dailies.some(t=>t.done)
  G.tasks=G.tasks.map(t=>t.daily?{...t,done:false,priority:false}:t)
  G._lastReset=today
  if(hadDone){
    playSound('midnight')
    showNotif({icon:'🌑',title:'SYSTEM RESET',body:'A new day dawns — daily quests reset',color:'#7b2fff',duration:5000})
    const fl=document.createElement('div')
    fl.style.cssText='position:fixed;inset:0;z-index:9996;background:radial-gradient(circle,rgba(123,47,255,.12),transparent 70%);pointer-events:none;animation:gateFlash .8s ease forwards'
    document.body.appendChild(fl);setTimeout(()=>fl.remove(),900)
  }
  saveState();render()
}
setInterval(checkMidnightReset,30000) // check every 30s
setTimeout(checkMidnightReset,2000)   // check on boot

// ── FEATURE 5: DARK SOVEREIGN MODE ────────────────────────────────────────────
function checkSovereignMode(){
  if(!G)return
  const isNational=G.rankIndex>=6
  const wasSovereign=document.body.classList.contains('sovereign')
  if(isNational&&!wasSovereign){
    document.body.classList.add('sovereign')
    playSound('arise')
    showNotif({icon:'👑',title:'DARK SOVEREIGN',body:'National Level reached — Shadow Monarch mode unlocked',color:'#ff2266',duration:6000})
  } else if(!isNational&&wasSovereign){
    document.body.classList.remove('sovereign')
  }
}

// Hook sounds into existing functions
const _origCompleteTask=completeTask
window.completeTask=function(id){
  _resumeAC();playSound('quest');_origCompleteTask(id);checkSovereignMode()
}
const _origShowHunterRankup=showHunterRankup
window.showHunterRankup=function(ri){
  playSound('rankup');_origShowHunterRankup(ri);setTimeout(checkSovereignMode,1200)
}
const _origShowTitleUnlock=showTitleUnlock
window.showTitleUnlock=function(t){
  playSound('title');_origShowTitleUnlock(t)
}
const _origStartHunter=startHunter
window.startHunter=function(){
  _resumeAC();playSound('arise');_origStartHunter()
}

// Boot sovereign check
setTimeout(checkSovereignMode,1500)

</script>
